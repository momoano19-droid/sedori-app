<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>せどりGPS管理PRO</title>

<style>
:root{
  --btn-font:16px;
  --btn-pad:10px;
  --btn-radius:10px;
}

body{font-family:-apple-system;padding:20px;background:#f4f6f8;}
h1{font-size:20px;margin:0 0 10px 0;}
input,select,button{padding:10px;margin:6px 0;width:100%;font-size:16px;}

button{
  background:#007aff;
  color:white;
  border:none;
  border-radius:var(--btn-radius);
  padding:var(--btn-pad);
  font-size:var(--btn-font);
}

.storeTitle{
  font-size:22px;
  font-weight:800;
  margin-bottom:6px;
}

.store{
  background:#fff;
  padding:12px;
  margin-top:12px;
  border-radius:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.grid{display:flex;gap:8px;flex-wrap:wrap;}
.smallbtn{flex:1 1 calc(50% - 8px);}
.danger{background:#ff3b30;}
.neutral{background:#34c759;}

.badge{
  display:inline-block;
  padding:2px 8px;
  border-radius:999px;
  background:#eef2f7;
  font-size:12px;
  margin-right:6px;
}

.toolbar{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.pill{
  background:#f0f3f8;
  border-radius:999px;
  padding:6px 10px;
  font-size:13px;
}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
  background:#fff;
}
th,td{
  padding:8px;
  border-bottom:1px solid #eee;
  font-size:14px;
}
th{background:#f7f9fc;}
</style>
</head>

<body>

<h1>せどりGPS管理PRO</h1>

<div class="grid">
  <input id="storeName" placeholder="店舗名">
  <input id="prefName" placeholder="都道府県">
</div>

<input id="mapUrl" placeholder="GoogleマップURL（Safariで開いた長いURL）">
<input id="defaultCategory" placeholder="デフォルトカテゴリ">

<button onclick="addStore()">店舗追加</button>

<!-- ボタン設定 -->
<div class="toolbar">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <b>⚙️ ボタン表示設定</b>
    <button onclick="toggleBtnSetting()" id="toggleBtnSettingBtn">非表示</button>
  </div>

  <div id="btnSettingWrap">

    文字サイズ
    <input type="range" min="12" max="24" value="16" id="btnFont" oninput="updateBtnStyle()">

    ボタン高さ
    <input type="range" min="6" max="20" value="10" id="btnPad" oninput="updateBtnStyle()">

    角丸
    <input type="range" min="6" max="28" value="10" id="btnRadius" oninput="updateBtnStyle()">

  </div>
</div>

<!-- 今日の行動計画 -->
<div class="toolbar">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <b>🗓 今日の行動計画</b>
    <button onclick="buildTodayRoute()">今日ルート作成</button>
  </div>
  <div id="todayPlanArea"></div>
</div>

<!-- レポート -->
<div class="toolbar">
  <div style="display:flex;justify-content:space-between;align-items:center;">
    <b>📊 レポート</b>
    <button onclick="toggleReport()" id="toggleReportBtn">非表示</button>
  </div>

  <div id="reportWrap">

    <input type="month" id="reportMonth">

    <div id="reportArea"></div>

  </div>
</div>

<div id="storeList"></div>

<!-- カテゴリ選択モーダル -->
<div id="overlay" style="position:fixed;left:0;top:0;right:0;bottom:0;
background:rgba(0,0,0,0.4);display:none;align-items:center;justify-content:center;z-index:9999;">

  <div style="background:#fff;padding:16px;border-radius:14px;width:90%;max-width:500px;"
       onclick="event.stopPropagation()">

    <h3 id="modalTitle">カテゴリ選択</h3>
    <div id="modalHint" style="font-size:13px;color:#666;margin-bottom:10px;"></div>

    <div id="chipArea" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;"></div>

    <input id="customCat" placeholder="その他カテゴリ">
    <button onclick="addCustomCategory()">追加</button>

    <div style="display:flex;gap:8px;margin-top:10px;">
      <button onclick="closeModal(false)" style="background:#ccc;color:#000;">キャンセル</button>
      <button onclick="closeModal(true)">確定</button>
    </div>

  </div>
</div>


<script>
let stores = JSON.parse(localStorage.getItem("stores")) || [];
let logs = JSON.parse(localStorage.getItem("logs")) || [];

function save(){
  localStorage.setItem("stores", JSON.stringify(stores));
  localStorage.setItem("logs", JSON.stringify(logs));
}

function addStore(){
  const name = storeName.value.trim();
  if(!name) return;

  stores.push({
    id:Date.now(),
    name,
    pref:prefName.value.trim(),
    visits:0,
    buyDays:0,
    items:0,
    profit:0,
    mapUrl:mapUrl.value.trim(),
    defaultCategory:defaultCategory.value.trim(),
    lat:null,
    lng:null,
    today:false
  });

  storeName.value="";
  prefName.value="";
  mapUrl.value="";
  defaultCategory.value="";

  save();
  render();
}

function render(){
  const list=document.getElementById("storeList");
  list.innerHTML="";

  stores.forEach((s,i)=>{

    const successRate = s.visits>0 ? (s.buyDays/s.visits*100).toFixed(1):0;
    const avgProfit = s.buyDays>0 ? Math.round(s.profit/s.buyDays):0;
    const expected = Math.round((successRate/100)*avgProfit);

    list.innerHTML+=`
    <div class="store">
      <div class="storeTitle">${s.name}</div>

      <div>
        <span class="badge">${s.pref||"未設定"}</span>
        <span class="badge">成功率:${successRate}%</span>
        <span class="badge">期待値:${expected}円</span>
      </div>

      <div style="margin-top:8px;">
        訪問:${s.visits}回 /
        成功:${s.buyDays}回 /
        個数:${s.items}個 /
        利益:${s.profit.toLocaleString()}円
      </div>

      <div class="grid" style="margin-top:8px;">
        <button class="smallbtn" onclick="visit(${i})">訪問＋</button>
        <button class="smallbtn danger" onclick="visitMinus(${i})">訪問−</button>

        <button class="smallbtn" onclick="boughtPlus(${i})">成功＋</button>
        <button class="smallbtn danger" onclick="boughtMinus(${i})">成功−</button>

        <button class="smallbtn" onclick="itemsPlus(${i})">個数＋</button>
        <button class="smallbtn danger" onclick="itemsMinus(${i})">個数−</button>

        <button class="smallbtn" onclick="profitPlus(${i})">利益＋</button>
        <button class="smallbtn danger" onclick="profitMinus(${i})">利益−</button>
      </div>

      <div style="margin-top:8px;">
        <label>
          <input type="checkbox" ${s.today?"checked":""}
            onchange="stores[${i}].today=this.checked;save();">
          今日行く
        </label>
      </div>

    </div>
    `;
  });
}

// ===== 日付 =====
function todayStr(){
  const d=new Date();
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
}

// ===== ボタンサイズ保存 =====
function updateBtnStyle(){
  const font=btnFont.value;
  const pad=btnPad.value;
  const rad=btnRadius.value;

  document.documentElement.style.setProperty("--btn-font",font+"px");
  document.documentElement.style.setProperty("--btn-pad",pad+"px");
  document.documentElement.style.setProperty("--btn-radius",rad+"px");

  localStorage.setItem("btnStyle",JSON.stringify({font,pad,rad}));
}

function loadBtnStyle(){
  const s=JSON.parse(localStorage.getItem("btnStyle")||"{}");
  if(!s.font) return;
  btnFont.value=s.font;
  btnPad.value=s.pad;
  btnRadius.value=s.rad;
  updateBtnStyle();
}

// ===== 表示切替 =====
function toggleBtnSetting(){
  const wrap=document.getElementById("btnSettingWrap");
  const btn=document.getElementById("toggleBtnSettingBtn");
  if(wrap.style.display==="none"){
    wrap.style.display="block";
    btn.textContent="非表示";
  }else{
    wrap.style.display="none";
    btn.textContent="表示";
  }
}

function toggleReport(){
  const wrap=document.getElementById("reportWrap");
  const btn=document.getElementById("toggleReportBtn");
  if(wrap.style.display==="none"){
    wrap.style.display="block";
    btn.textContent="非表示";
  }else{
    wrap.style.display="none";
    btn.textContent="表示";
  }
}

// ===== 操作 =====
function visit(i){
  stores[i].visits++;
  logs.push({date:todayStr(),storeId:stores[i].id,type:"visit",delta:1});
  save();render();
}
function visitMinus(i){
  stores[i].visits=Math.max(0,stores[i].visits-1);
  logs.push({date:todayStr(),storeId:stores[i].id,type:"visit",delta:-1});
  save();render();
}
function boughtPlus(i){
  stores[i].buyDays++;
  logs.push({date:todayStr(),storeId:stores[i].id,type:"success",delta:1});
  save();render();
}
function boughtMinus(i){
  stores[i].buyDays=Math.max(0,stores[i].buyDays-1);
  logs.push({date:todayStr(),storeId:stores[i].id,type:"success",delta:-1});
  save();render();
}
function itemsPlus(i){
  const n=parseInt(prompt("追加個数","1"));
  if(!n) return;
  stores[i].items+=n;
  logs.push({date:todayStr(),storeId:stores[i].id,type:"items",delta:n});
  save();render();
}
function itemsMinus(i){
  const n=parseInt(prompt("減らす個数","1"));
  if(!n) return;
  stores[i].items=Math.max(0,stores[i].items-n);
  logs.push({date:todayStr(),storeId:stores[i].id,type:"items",delta:-n});
  save();render();
}
function profitPlus(i){
  const n=parseInt(prompt("利益追加","1000"));
  if(!n) return;
  stores[i].profit+=n;
  logs.push({date:todayStr(),storeId:stores[i].id,type:"profit",delta:n});
  save();render();
}
function profitMinus(i){
  const n=parseInt(prompt("利益減算","1000"));
  if(!n) return;
  stores[i].profit=Math.max(0,stores[i].profit-n);
  logs.push({date:todayStr(),storeId:stores[i].id,type:"profit",delta:-n});
  save();render();
}

// ===== 距離計算 =====
function distanceKm(lat1,lng1,lat2,lng2){
  const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+
  Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
  Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ===== ルートD仕様 =====
function buildTodayRoute(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const start={lat:pos.coords.latitude,lng:pos.coords.longitude};

    const targets=stores
      .map((s,i)=>({...s,_i:i}))
      .filter(s=>s.today);

    if(!targets.length){
      alert("今日行く店舗がありません");
      return;
    }

    const remaining=[...targets];
    const route=[];
    let cur=start;

    while(remaining.length){
      let best=0;
      let bestScore=-999;

      for(let i=0;i<remaining.length;i++){
        const dist=distanceKm(cur.lat,cur.lng,remaining[i].lat||0,remaining[i].lng||0);
        const successRate=remaining[i].visits>0?
          (remaining[i].buyDays/remaining[i].visits):0;
        const avgProfit=remaining[i].buyDays>0?
          (remaining[i].profit/remaining[i].buyDays):0;
        const expected=successRate*avgProfit;

        const score=expected/(dist+0.3);
        if(score>bestScore){
          bestScore=score;
          best=i;
        }
      }

      const next=remaining.splice(best,1)[0];
      next._dist=distanceKm(cur.lat,cur.lng,next.lat||0,next.lng||0);
      route.push(next);
      cur={lat:next.lat||0,lng:next.lng||0};
    }

    let totalExpected=0;
    route.forEach(s=>{
      const successRate=s.visits>0?(s.buyDays/s.visits):0;
      const avgProfit=s.buyDays>0?(s.profit/s.buyDays):0;
      totalExpected+=successRate*avgProfit;
    });

    let html=`
      <div class="kv">
        <div class="pill">巡回:${route.length}</div>
        <div class="pill">予想総利益:${Math.round(totalExpected).toLocaleString()}円</div>
      </div>
    `;

    // 20件ずつ分割
    const chunkSize=20;
    for(let i=0;i<route.length;i+=chunkSize){
      const chunk=route.slice(i,i+chunkSize);

      const origin=`${start.lat},${start.lng}`;
      const dest=`${chunk[chunk.length-1].lat||0},${chunk[chunk.length-1].lng||0}`;
      const wp=chunk.slice(0,chunk.length-1)
        .map(s=>`${s.lat||0},${s.lng||0}`).join("|");

      const url=`https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${wp}&travelmode=driving`;

      html+=`
        <div style="margin-top:8px;">
          <a href="${url}" target="_blank" style="display:block;background:#007aff;color:#fff;padding:10px;border-radius:10px;text-align:center;">
            🧭 ルート${Math.floor(i/chunkSize)+1}を開く（${chunk.length}件）
          </a>
        </div>
      `;
    }

    todayPlanArea.innerHTML=html;

  });
}

// ===== 初期化 =====
loadBtnStyle();
render();

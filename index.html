<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>せどりGPS管理PRO</title>
<style>
  body{font-family:-apple-system;padding:20px;background:#f4f6f8;}
  h1{font-size:20px;margin:0 0 10px 0;}
  input,select,button{padding:10px;margin:6px 0;width:100%;font-size:16px;}
  button{background:#007aff;color:white;border:none;border-radius:10px;}
  .grid{display:flex;gap:8px;flex-wrap:wrap;}
  .smallbtn{flex:1 1 calc(50% - 8px);}
  .store{background:#fff;padding:12px;margin-top:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .meta{line-height:1.6;}
  .strong{font-weight:700;}
  .danger{background:#ff3b30;}
  .neutral{background:#34c759;}
  .gray{color:#666;font-size:14px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef2f7;color:#334;font-size:12px;margin-left:6px;}
  .sectionTitle{font-weight:700;color:#223;margin-top:18px;}
  .row2{display:flex;gap:8px;}
  .row2 > *{flex:1;}
  .toolbar{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-top:12px;}
  .seg{display:flex;gap:8px;}
  .seg button{width:auto;flex:1;background:#e9eef6;color:#123;}
  .seg button.active{background:#007aff;color:#fff;}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .pill{background:#f0f3f8;border-radius:999px;padding:6px 10px;font-size:13px;}
</style>
</head>
<body>

<h1>せどりGPS管理PRO</h1>

<div class="row2">
  <input id="storeName" placeholder="店舗名を入力">
  <input id="prefName" placeholder="都道府県（例：茨城県）">
</div>
<input id="mapUrl" placeholder="GoogleマップURL（任意：共有→リンクをコピーして貼る）">
<button onclick="addStore()">店舗追加</button>

<div class="toolbar">
  <div class="row2">
    <input id="q" placeholder="🔎 店舗検索（店舗名/都道府県）" oninput="render()">
    <select id="prefFilter" onchange="render()"></select>
  </div>

  <div class="seg" style="margin-top:8px;">
    <button id="layoutDetail" onclick="setLayout('detail')">詳細</button>
    <button id="layoutCompact" onclick="setLayout('compact')">コンパクト</button>
    <button id="layoutList" onclick="setLayout('list')">リスト</button>
    <button id="layoutAnalysis" onclick="setLayout('analysis')">分析</button>
  </div>

  <div class="row2" style="margin-top:8px;">
    <select id="sortType" onchange="render()">
      <option value="expected">期待値順</option>
      <option value="rate">成功率順</option>
      <option value="avgProfit">平均利益順</option>
      <option value="visits">訪問回数順</option>
      <option value="route">ルート最適化（期待値÷距離）</option>
    </select>
    <button onclick="optimizeRoute()">🚗 現在地でルート最適化</button>
  </div>

  <div class="row2">
    <input id="minExpected" placeholder="期待値 下限（例：2000）" oninput="render()">
    <input id="minRate" placeholder="成功率 下限%（例：30）" oninput="render()">
  </div>

  <div class="gray" style="margin-top:8px;">
    ※ 検索中は「検索結果だけ表示」。ルート最適化は「緯度経度を登録した店舗」だけ距離/スコアが出ます。
  </div>
</div>

<div id="storeList"></div>

<script>
let stores = JSON.parse(localStorage.getItem("stores")) || [];
let layout = localStorage.getItem("layout") || "detail";
let lastPos = null; // {lat,lng}

// 互換性：古いデータ補完（lat/lng/urlが無い場合も対応）
stores = stores.map(s => ({
  name: s.name ?? "店舗",
  pref: (s.pref ?? "").trim(),
  visits: Number(s.visits ?? 0),
  buyDays: Number(s.buyDays ?? 0),
  items: Number(s.items ?? 0),
  profit: Number(s.profit ?? 0),
  mapUrl: (s.mapUrl ?? "").trim(),
  lat: (typeof s.lat === "number") ? s.lat : null,
  lng: (typeof s.lng === "number") ? s.lng : null,
}));

function clampNonNeg(n){ return Math.max(0, Number(n) || 0); }
function save(){ localStorage.setItem("stores", JSON.stringify(stores)); }

function setLayout(v){
  layout = v;
  localStorage.setItem("layout", layout);
  render();
}

function extractLatLng(url){
  if(!url) return null;

  // 1) @lat,lng 形式
  let m = url.match(/@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};

  // 2) !3dlat!4dlng 形式
  m = url.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};

  return null;
}

function addStore(){
  const name = document.getElementById("storeName").value.trim();
  const pref = document.getElementById("prefName").value.trim();
  const mapUrl = document.getElementById("mapUrl").value.trim();

  if(!name) return;

  let lat = null, lng = null;
  if(mapUrl){
    const c = extractLatLng(mapUrl);
    if(!c){
      alert("GoogleマップURLから座標が取れませんでした。\n店舗ページで「共有→リンクをコピー」して貼り直してみてください。");
      return;
    }
    lat = c.lat; lng = c.lng;
  }

  stores.push({name, pref, visits:0, buyDays:0, items:0, profit:0, mapUrl, lat, lng});

  document.getElementById("storeName").value="";
  document.getElementById("prefName").value="";
  document.getElementById("mapUrl").value="";
  save(); render();
}

function visit(i){ stores[i].visits++; save(); render(); }
function visitMinus(i){
  stores[i].visits = clampNonNeg(stores[i].visits - 1);
  if(stores[i].buyDays > stores[i].visits) stores[i].buyDays = stores[i].visits;
  save(); render();
}

function boughtPlus(i){
  stores[i].buyDays++;
  if(stores[i].buyDays > stores[i].visits) stores[i].visits = stores[i].buyDays;
  const num = prompt("今回の仕入れ個数は？（数字）", "1");
  if(num !== null && String(num).trim() !== ""){
    stores[i].items += clampNonNeg(parseInt(num,10));
  }
  save(); render();
}
function boughtMinus(i){
  stores[i].buyDays = clampNonNeg(stores[i].buyDays - 1);
  save(); render();
}

function itemsPlus(i){
  const num = prompt("追加する個数は？（数字）", "1");
  if(num !== null && String(num).trim() !== ""){
    stores[i].items += clampNonNeg(parseInt(num,10));
  }
  save(); render();
}
function itemsMinus(i){
  const num = prompt("減らす個数は？（数字）", "1");
  if(num !== null && String(num).trim() !== ""){
    stores[i].items = clampNonNeg(stores[i].items - clampNonNeg(parseInt(num,10)));
  }
  save(); render();
}

function profitPlus(i){
  const yen = prompt("追加する利益（円）は？（数字）", "1000");
  if(yen !== null && String(yen).trim() !== ""){
    stores[i].profit += clampNonNeg(parseInt(yen,10));
  }
  save(); render();
}
function profitMinus(i){
  const yen = prompt("減らす利益（円）は？（数字）", "1000");
  if(yen !== null && String(yen).trim() !== ""){
    stores[i].profit = clampNonNeg(stores[i].profit - clampNonNeg(parseInt(yen,10)));
  }
  save(); render();
}

// 設定（名前/都道府県/GoogleマップURL）
function editStore(i){
  const s = stores[i];
  const newName = prompt("店舗名を修正（空欄でキャンセル）", s.name || "");
  if(newName === null) return;
  const nameTrim = String(newName).trim();
  if(!nameTrim) return;

  const newPref = prompt("都道府県を修正（空欄OK）", (s.pref||"").trim());
  if(newPref === null) return;

  const newUrl = prompt("GoogleマップURLを修正（空欄OK）", (s.mapUrl||"").trim());
  if(newUrl === null) return;

  let lat = s.lat, lng = s.lng;
  const urlTrim = String(newUrl).trim();
  if(urlTrim){
    const c = extractLatLng(urlTrim);
    if(!c){
      alert("URLから座標が取れませんでした。\n「共有→リンクをコピー」したURLを貼ってください。");
      return;
    }
    lat = c.lat; lng = c.lng;
  } else {
    // URL空欄なら座標も外す（必要ならコメントアウトOK）
    lat = null; lng = null;
  }

  stores[i].name = nameTrim;
  stores[i].pref = String(newPref).trim();
  stores[i].mapUrl = urlTrim;
  stores[i].lat = lat;
  stores[i].lng = lng;

  save(); render();
}

function deleteStore(i){
  const ok = confirm(`「${stores[i].name}」を削除しますか？\n（データは戻せません）`);
  if(!ok) return;
  stores.splice(i,1);
  save(); render();
}

// 指標計算
function calcMetrics(s){
  const visits = clampNonNeg(s.visits);
  const success = clampNonNeg(s.buyDays);
  const items = clampNonNeg(s.items);
  const profit = clampNonNeg(s.profit);

  const rate = visits > 0 ? (success / visits) * 100 : 0;
  const avgProfit = success > 0 ? (profit / success) : 0;
  const expected = (rate/100) * avgProfit;
  const profitPerItem = items > 0 ? (profit / items) : 0;

  return {visits, success, items, profit, rate, avgProfit, expected, profitPerItem};
}

// 距離計算（km）
function distanceKm(lat1,lng1,lat2,lng2){
  const R = 6371; // km
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

// ルート最適化（現在地取得→routeにする）
function optimizeRoute(){
  if(!navigator.geolocation){
    alert("この端末では位置情報が使えません。");
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      lastPos = {lat: pos.coords.latitude, lng: pos.coords.longitude};
      document.getElementById("sortType").value = "route";
      render();
    },
    (err)=>{
      alert("位置情報が取得できませんでした。\niPhone設定 > プライバシー > 位置情報サービス で許可を確認してください。");
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

// 都道府県フィルタ候補
function buildPrefFilter(){
  const prefSet = new Set();
  stores.forEach(s => { if((s.pref||"").trim()) prefSet.add(s.pref.trim()); });

  const prefs = Array.from(prefSet).sort((a,b)=>a.localeCompare(b,'ja'));
  const sel = document.getElementById("prefFilter");
  const current = sel.value || "__ALL__";

  sel.innerHTML = "";
  sel.innerHTML += `<option value="__ALL__">全て（都道府県ごと表示）</option>`;
  prefs.forEach(p=>{
    sel.innerHTML += `<option value="${escapeHtmlAttr(p)}">${escapeHtml(p)}</option>`;
  });

  if(Array.from(sel.options).some(o=>o.value===current)) sel.value = current;
  else sel.value="__ALL__";
}

function avgExpected(arr){
  if(!arr || arr.length===0) return 0;
  let sum = 0;
  arr.forEach(s => sum += calcMetrics(s).expected);
  return sum / arr.length;
}

function matchesQuery(s, q){
  if(!q) return true;
  const t = (s.name + " " + (s.pref||"")).toLowerCase();
  return t.includes(q.toLowerCase());
}

function render(){
  buildPrefFilter();

  // layout button state
  document.getElementById("layoutDetail").classList.toggle("active", layout==="detail");
  document.getElementById("layoutCompact").classList.toggle("active", layout==="compact");
  document.getElementById("layoutList").classList.toggle("active", layout==="list");
  document.getElementById("layoutAnalysis").classList.toggle("active", layout==="analysis");

  const filter = document.getElementById("prefFilter").value;
  const q = (document.getElementById("q").value || "").trim();

  const minExpected = clampNonNeg(parseFloat(document.getElementById("minExpected").value || "0"));
  const minRate = clampNonNeg(parseFloat(document.getElementById("minRate").value || "0"));

  const sortType = document.getElementById("sortType").value;

  // build view items (metrics + distance/score)
  let view = stores.slice()
    .filter(s => matchesQuery(s, q))
    .filter(s => {
      const m = calcMetrics(s);
      return m.expected >= minExpected && m.rate >= minRate;
    })
    .map(s => {
      const m = calcMetrics(s);
      let dist = null, score = null;

      if(lastPos && typeof s.lat === "number" && typeof s.lng === "number"){
        dist = distanceKm(lastPos.lat, lastPos.lng, s.lat, s.lng);
        // 近すぎで割り算が暴れないように +0.2km
        score = m.expected / (dist + 0.2);
      }
      return {...s, _m:m, _dist:dist, _score:score};
    });

  // if not searching, apply pref filter
  if(!q && filter !== "__ALL__"){
    view = view.filter(s => (s.pref||"").trim() === filter);
  }

  // group
  const grouped = new Map();
  if(q){
    grouped.set("検索結果", view);
  } else if(filter === "__ALL__"){
    view.forEach(s=>{
      const key = (s.pref||"").trim() || "（未設定）";
      if(!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(s);
    });
  } else {
    grouped.set(filter, view);
  }

  // sort inside each group
  for(const [k, arr] of grouped.entries()){
    arr.sort((a,b)=>{
      if(sortType === "route"){
        // scoreが無い（座標未登録）は後ろへ
        const as = (typeof a._score === "number") ? a._score : -Infinity;
        const bs = (typeof b._score === "number") ? b._score : -Infinity;
        if(bs !== as) return bs - as;

        // fallback
        return b._m.expected - a._m.expected;
      }
      if(sortType === "rate"){
        if(b._m.rate !== a._m.rate) return b._m.rate - a._m.rate;
      } else if(sortType === "avgProfit"){
        if(b._m.avgProfit !== a._m.avgProfit) return b._m.avgProfit - a._m.avgProfit;
      } else if(sortType === "visits"){
        if(b._m.visits !== a._m.visits) return b._m.visits - a._m.visits;
      } else {
        if(b._m.expected !== a._m.expected) return b._m.expected - a._m.expected;
      }
      // tie-break
      return b._m.expected - a._m.expected;
    });
  }

  // group order for ALL (optional)
  let groupKeys = Array.from(grouped.keys());
  if(!q && filter === "__ALL__"){
    groupKeys.sort((k1,k2)=> avgExpected(grouped.get(k2).map(x=>({ ...x, ...x._m }))) - avgExpected(grouped.get(k1).map(x=>({ ...x, ...x._m }))));
  }

  const list = document.getElementById("storeList");
  list.innerHTML = "";

  groupKeys.forEach(prefKey=>{
    const arr = grouped.get(prefKey) || [];
    if(arr.length===0) return;

    const groupAvg = avgExpected(arr.map(x=>({ expected: x._m.expected })));

    list.innerHTML += `
      <div class="sectionTitle">
        ${escapeHtml(prefKey)}
        ${q ? "" : `<span class="badge">平均期待値 ${Math.round(groupAvg).toLocaleString()}円</span>`}
      </div>
    `;

    arr.forEach(s=>{
      const i = stores.indexOf(stores.find(x => x === s) || stores.find(x => x.name===s.name && x.pref===s.pref) || stores[0]);
      const m = s._m;
      const distText = (typeof s._dist === "number") ? `${s._dist.toFixed(1)}km` : "—";
      const scoreText = (typeof s._score === "number") ? `${Math.round(s._score)} /km` : "—";

      // common header
      const header = `
        <div class="strong">
          ${escapeHtml(s.name)}
          <span class="badge">${escapeHtml((s.pref||"").trim() || "未設定")}</span>
        </div>
      `;

      if(layout === "list"){
        list.innerHTML += `
          <div class="store">
            ${header}
            <div class="kv">
              <div class="pill"><b>期待値</b> ${Math.round(m.expected).toLocaleString()}円</div>
              <div class="pill"><b>距離</b> ${distText}</div>
              <div class="pill"><b>スコア</b> ${scoreText}</div>
            </div>
            <div class="grid" style="margin-top:10px;">
              <button class="smallbtn neutral" onclick="editStore(${i})">設定</button>
              <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
            </div>
          </div>
        `;
        return;
      }

      if(layout === "analysis"){
        list.innerHTML += `
          <div class="store">
            ${header}
            <div class="kv">
              <div class="pill"><b>期待値</b> ${Math.round(m.expected).toLocaleString()}円</div>
              <div class="pill"><b>成功率</b> ${m.rate.toFixed(1)}%</div>
              <div class="pill"><b>平均利益</b> ${Math.round(m.avgProfit).toLocaleString()}円</div>
              <div class="pill"><b>距離</b> ${distText}</div>
              <div class="pill"><b>スコア</b> ${scoreText}</div>
            </div>
            <div class="gray" style="margin-top:8px;">※ スコア＝期待値÷距離（近くて期待値高いほど上）</div>
            <div class="grid" style="margin-top:10px;">
              <button class="smallbtn neutral" onclick="editStore(${i})">設定</button>
              <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
            </div>
          </div>
        `;
        return;
      }

      if(layout === "compact"){
        list.innerHTML += `
          <div class="store">
            ${header}
            <div class="kv">
              <div class="pill"><b>期待値</b> ${Math.round(m.expected).toLocaleString()}円</div>
              <div class="pill"><b>成功率</b> ${m.rate.toFixed(1)}%</div>
              <div class="pill"><b>距離</b> ${distText}</div>
              <div class="pill"><b>スコア</b> ${scoreText}</div>
              <div class="pill"><b>訪問</b> ${m.visits}</div>
              <div class="pill"><b>成功</b> ${m.success}</div>
            </div>
            <div class="grid" style="margin-top:10px;">
              <button class="smallbtn" onclick="visit(${i})">訪問＋</button>
              <button class="smallbtn danger" onclick="visitMinus(${i})">訪問−</button>
              <button class="smallbtn" onclick="boughtPlus(${i})">成功＋</button>
              <button class="smallbtn danger" onclick="boughtMinus(${i})">成功−</button>
              <button class="smallbtn neutral" onclick="editStore(${i})">設定</button>
              <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
            </div>
          </div>
        `;
        return;
      }

      // detail
      list.innerHTML += `
        <div class="store">
          ${header}
          <div class="meta">
            訪問回数：${m.visits}回<br>
            成功回数：${m.success}回<br>
            総仕入れ個数：${m.items}個<br>
            合計利益：${m.profit.toLocaleString()}円<br>
            成功率：${m.rate.toFixed(1)}%<br>
            平均利益（1回）：${Math.round(m.avgProfit).toLocaleString()}円<br>
            <span class="strong">期待値（1訪問あたり）：${Math.round(m.expected).toLocaleString()}円</span><br>
            1商品あたり利益：${Math.round(m.profitPerItem).toLocaleString()}円<br>
            距離：${distText} / ルートスコア：${scoreText}
          </div>

          <div class="grid" style="margin-top:10px;">
            <button class="smallbtn" onclick="visit(${i})">訪問＋</button>
            <button class="smallbtn danger" onclick="visitMinus(${i})">訪問−</button>

            <button class="smallbtn" onclick="boughtPlus(${i})">成功＋（個数入力あり）</button>
            <button class="smallbtn danger" onclick="boughtMinus(${i})">成功−</button>

            <button class="smallbtn" onclick="itemsPlus(${i})">個数＋</button>
            <button class="smallbtn danger" onclick="itemsMinus(${i})">個数−</button>

            <button class="smallbtn" onclick="profitPlus(${i})">利益＋</button>
            <button class="smallbtn danger" onclick="profitMinus(${i})">利益−</button>

            <button class="smallbtn neutral" onclick="editStore(${i})">設定（名前/都道府県/URL）</button>
            <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
          </div>

          <div class="gray" style="margin-top:8px;">
            ※ 期待値＝成功率×平均利益 ／ スコア＝期待値÷距離
          </div>
        </div>
      `;
    });
  });

  if(list.innerHTML.trim() === ""){
    list.innerHTML = `<div class="gray" style="margin-top:14px;">該当する店舗がありません。</div>`;
  }
}

// XSS対策
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeHtmlAttr(str){
  return escapeHtml(str).replaceAll("`","&#096;");
}

render();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>せどりGPS管理PRO</title>
<style>
  body{font-family:-apple-system;padding:20px;background:#f4f6f8;}
  h1{font-size:20px;margin:0 0 10px 0;}
  input,select,button{padding:10px;margin:6px 0;width:100%;font-size:16px;}
  button{background:#007aff;color:white;border:none;border-radius:10px;}
  .grid{display:flex;gap:8px;flex-wrap:wrap;}
  .smallbtn{flex:1 1 calc(50% - 8px);}
  .store{background:#fff;padding:12px;margin-top:12px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .meta{line-height:1.6;}
  .strong{font-weight:700;}
  .danger{background:#ff3b30;}
  .neutral{background:#34c759;}
  .gray{color:#666;font-size:14px;}
  .badge{display:inline-block;padding:2px 8px;border-radius:999px;background:#eef2f7;color:#334;font-size:12px;margin-left:6px;}
  .sectionTitle{font-weight:700;color:#223;margin-top:18px;}
  .row2{display:flex;gap:8px;}
  .row2 > *{flex:1;}
  .toolbar{background:#fff;border-radius:12px;padding:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-top:12px;}
  .seg{display:flex;gap:8px;}
  .seg button{width:auto;flex:1;background:#e9eef6;color:#123;}
  .seg button.active{background:#007aff;color:#fff;}
  .kv{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  .pill{background:#f0f3f8;border-radius:999px;padding:6px 10px;font-size:13px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .chip{background:#eef2f7;color:#123;border-radius:999px;padding:8px 12px;font-size:14px;border:1px solid #dfe6f2;width:auto;}
  .chip.primary{background:#007aff;color:#fff;border-color:#007aff;}
  .chip.gray{background:#f0f3f8;color:#444;}
  /* modal */
  .overlay{position:fixed;left:0;top:0;right:0;bottom:0;background:rgba(0,0,0,0.35);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999;}
  .modal{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:14px;box-shadow:0 10px 30px rgba(0,0,0,0.25);}
  .modal h2{margin:0 0 6px 0;font-size:18px;}
  .modal .small{color:#666;font-size:13px;margin:0 0 10px 0;line-height:1.4;}
  .modal .row{display:flex;gap:8px;}
  .modal .row > *{flex:1;}
  .modal .actions{display:flex;gap:8px;margin-top:10px;}
  .modal .actions button{flex:1;}
  .modal button.secondary{background:#e9eef6;color:#123;}
</style>
</head>
<body>

<h1>せどりGPS管理PRO</h1>

<div class="row2">
  <input id="storeName" placeholder="店舗名を入力">
  <input id="prefName" placeholder="都道府県（例：茨城県）">
</div>
<input id="mapUrl" placeholder="GoogleマップURL（任意：共有→リンクをコピーして貼る）">
<input id="defaultCategory" placeholder="デフォルトカテゴリ（例：本 / 家電）">
<button onclick="addStore()">店舗追加</button>

<div class="toolbar">
  <div class="row2">
    <input id="q" placeholder="🔎 店舗検索（店舗名/都道府県/カテゴリ）" oninput="render()">
    <select id="prefFilter" onchange="render()"></select>
  </div>

  <div class="seg" style="margin-top:8px;">
    <button id="layoutDetail" onclick="setLayout('detail')">詳細</button>
    <button id="layoutCompact" onclick="setLayout('compact')">コンパクト</button>
    <button id="layoutList" onclick="setLayout('list')">リスト</button>
    <button id="layoutAnalysis" onclick="setLayout('analysis')">分析</button>
  </div>

  <div class="row2" style="margin-top:8px;">
    <select id="sortType" onchange="render()">
      <option value="expected">期待値順</option>
      <option value="rate">成功率順</option>
      <option value="avgProfit">平均利益順</option>
      <option value="visits">訪問回数順</option>
      <option value="route">ルート最適化（期待値÷距離）</option>
    </select>
    <button onclick="optimizeRoute()">🚗 現在地でルート最適化</button>
  </div>

  <div class="row2">
    <input id="minExpected" placeholder="期待値 下限（例：2000）" oninput="render()">
    <input id="minRate" placeholder="成功率 下限%（例：30）" oninput="render()">
  </div>

  <div class="gray" style="margin-top:8px;">
    ※ 個数を入れると「カテゴリ選択（ボタン最大24）」が出ます（クイック最大12）。<br>
    ※ ルート最適化は「URLから座標を登録した店舗」だけ距離/スコアが出ます。
  </div>
</div>

<div id="storeList"></div>

<!-- カテゴリ選択モーダル -->
<div id="overlay" class="overlay" onclick="overlayClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">カテゴリ選択</h2>
    <p id="modalHint" class="small"></p>

    <div id="chipArea" class="chips"></div>

    <div class="row" style="margin-top:10px;">
      <input id="customCat" placeholder="その他：カテゴリを手入力">
      <button class="secondary" onclick="addCustomCategory()">追加</button>
    </div>

    <div class="actions">
      <button class="secondary" onclick="closeModal(false)">キャンセル</button>
      <button onclick="closeModal(true)">確定</button>
    </div>
  </div>
</div>

<script>
/** ===== 設定値 ===== */
const QUICK_LIMIT = 12; // 店ごとのクイック最大
const CHIP_LIMIT  = 24; // 表示するカテゴリボタン最大（カテゴリなしは別枠）

/** ===== データ ===== */
let stores = JSON.parse(localStorage.getItem("stores")) || [];
let layout = localStorage.getItem("layout") || "detail";
let lastPos = null;

// modal state
let modalState = {
  open:false,
  storeIndex:null,
  deltaItems:0,
  selectedCat:""
};

// 互換性補完
stores = stores.map(s => ({
  name: s.name ?? "店舗",
  pref: (s.pref ?? "").trim(),
  visits: Number(s.visits ?? 0),
  buyDays: Number(s.buyDays ?? 0),
  items: Number(s.items ?? 0),
  profit: Number(s.profit ?? 0),
  mapUrl: (s.mapUrl ?? "").trim(),
  lat: (typeof s.lat === "number") ? s.lat : null,
  lng: (typeof s.lng === "number") ? s.lng : null,
  defaultCategory: (s.defaultCategory ?? "").trim(),
  categoryCounts: (s.categoryCounts && typeof s.categoryCounts === "object") ? s.categoryCounts : {},
  quickCategories: Array.isArray(s.quickCategories) ? s.quickCategories.filter(Boolean).slice(0,QUICK_LIMIT) : []
}));

function clampNonNeg(n){ return Math.max(0, Number(n) || 0); }
function save(){ localStorage.setItem("stores", JSON.stringify(stores)); }

function setLayout(v){ layout=v; localStorage.setItem("layout",layout); render(); }

/** ===== 座標抽出（Google Maps URL） ===== */
function extractLatLng(url){
  if(!url) return null;
  let m = url.match(/@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};
  m = url.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};
  return null;
}

/** ===== 店舗追加 ===== */
function addStore(){
  const name = document.getElementById("storeName").value.trim();
  const pref = document.getElementById("prefName").value.trim();
  const mapUrl = document.getElementById("mapUrl").value.trim();
  const defaultCategory = document.getElementById("defaultCategory").value.trim();
  if(!name) return;

  let lat=null, lng=null;
  if(mapUrl){
    const c = extractLatLng(mapUrl);
    if(!c){
      alert("GoogleマップURLから座標が取れませんでした。\n「共有→リンクをコピー」したURLを貼ってください。");
      return;
    }
    lat=c.lat; lng=c.lng;
  }

  const quick = [];
  if(defaultCategory) quick.push(defaultCategory);

  stores.push({
    name,pref,
    visits:0,buyDays:0,items:0,profit:0,
    mapUrl,lat,lng,
    defaultCategory,
    categoryCounts:{},
    quickCategories: quick
  });

  document.getElementById("storeName").value="";
  document.getElementById("prefName").value="";
  document.getElementById("mapUrl").value="";
  document.getElementById("defaultCategory").value="";
  save(); render();
}

/** ===== カテゴリ集計 ===== */
function addItemsToCategory(i, cat, delta){
  const s = stores[i];
  const category = String(cat||"").trim();
  if(!category) return;

  if(!s.categoryCounts || typeof s.categoryCounts !== "object") s.categoryCounts = {};
  const cur = clampNonNeg(s.categoryCounts[category] ?? 0);
  const next = clampNonNeg(cur + delta);
  if(next === 0) delete s.categoryCounts[category];
  else s.categoryCounts[category] = next;

  // クイックに反映（最大12）
  if(!s.quickCategories) s.quickCategories = [];
  if(!s.quickCategories.includes(category)){
    s.quickCategories.unshift(category);
    s.quickCategories = s.quickCategories.slice(0,QUICK_LIMIT);
  }
  if(!s.defaultCategory) s.defaultCategory = category;
}

function getAllCategories(){
  const set = new Set();
  stores.forEach(s=>{
    const dc = (s.defaultCategory||"").trim();
    if(dc) set.add(dc);
    (s.quickCategories||[]).forEach(c=>{ c=String(c).trim(); if(c) set.add(c); });
    Object.keys(s.categoryCounts||{}).forEach(k=>{ k=String(k).trim(); if(k) set.add(k); });
  });
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'ja'));
}

function categorySummary(s){
  const cc = s.categoryCounts || {};
  const keys = Object.keys(cc);
  if(!keys.length) return "";
  keys.sort((a,b)=>(cc[b]||0)-(cc[a]||0));
  const top = keys.slice(0,3).map(k => `${k}:${cc[k]}`);
  const more = keys.length > 3 ? ` +${keys.length-3}` : "";
  return `（${top.join(" / ")}${more}）`;
}

/** ===== モーダル ===== */
function openCategoryModal(storeIndex, deltaItems, title){
  const s = stores[storeIndex];
  modalState.open = true;
  modalState.storeIndex = storeIndex;
  modalState.deltaItems = deltaItems;
  modalState.selectedCat = s.defaultCategory || "";

  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalHint").textContent =
    `店舗：${s.name} / 個数：${deltaItems}　（ボタンで選択。無ければ下で追加）`;

  document.getElementById("customCat").value = "";
  rebuildChips();
  document.getElementById("overlay").style.display = "flex";
}

function rebuildChips(){
  const area = document.getElementById("chipArea");
  area.innerHTML = "";

  const s = stores[modalState.storeIndex];
  const chips = [];

  // 1) 店のクイック（最大12）
  (s.quickCategories||[]).forEach(c=>{
    c = String(c).trim();
    if(c && !chips.includes(c)) chips.push(c);
  });

  // 2) 全体候補から補完（最大24）
  getAllCategories().forEach(c=>{
    if(chips.length >= CHIP_LIMIT) return;
    if(!chips.includes(c)) chips.push(c);
  });

  // 3) 選択中が候補に無い場合は入れる
  if(modalState.selectedCat && !chips.includes(modalState.selectedCat)){
    chips.unshift(modalState.selectedCat);
  }

  chips.slice(0,CHIP_LIMIT).forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "chip" + (cat === modalState.selectedCat ? " primary" : "");
    btn.type = "button";
    btn.textContent = cat;
    btn.onclick = () => { modalState.selectedCat = cat; rebuildChips(); };
    area.appendChild(btn);
  });

  // カテゴリなし（内訳に加算しない）
  const noneBtn = document.createElement("button");
  noneBtn.className = "chip gray" + (!modalState.selectedCat ? " primary" : "");
  noneBtn.type="button";
  noneBtn.textContent = "カテゴリなし";
  noneBtn.onclick = () => { modalState.selectedCat = ""; rebuildChips(); };
  area.appendChild(noneBtn);
}

function addCustomCategory(){
  const v = document.getElementById("customCat").value.trim();
  if(!v) return;

  modalState.selectedCat = v;

  const s = stores[modalState.storeIndex];
  if(!s.quickCategories) s.quickCategories=[];
  if(!s.quickCategories.includes(v)){
    s.quickCategories.unshift(v);
    s.quickCategories = s.quickCategories.slice(0,QUICK_LIMIT);
  }
  rebuildChips();
  document.getElementById("customCat").value = "";
}

function overlayClick(e){
  // 背景クリックで閉じない（誤操作防止）
}

function closeModal(commit){
  document.getElementById("overlay").style.display = "none";
  modalState.open = false;

  if(!commit) return;

  const i = modalState.storeIndex;
  const delta = modalState.deltaItems;
  const cat = modalState.selectedCat;

  if(delta !== 0){
    stores[i].items = clampNonNeg(stores[i].items + delta);
    addItemsToCategory(i, cat, delta);
  }

  save();
  render();
}

/** ===== 操作 ===== */
function visit(i){ stores[i].visits++; save(); render(); }
function visitMinus(i){
  stores[i].visits = clampNonNeg(stores[i].visits - 1);
  if(stores[i].buyDays > stores[i].visits) stores[i].buyDays = stores[i].visits;
  save(); render();
}

function boughtPlus(i){
  stores[i].buyDays++;
  if(stores[i].buyDays > stores[i].visits) stores[i].visits = stores[i].buyDays;

  const numStr = prompt("今回の仕入れ個数は？（数字）", "1");
  if(numStr !== null && String(numStr).trim() !== ""){
    const n = clampNonNeg(parseInt(numStr,10));
    openCategoryModal(i, n, "カテゴリ選択（成功＋）");
  } else {
    save(); render();
  }
}
function boughtMinus(i){ stores[i].buyDays = clampNonNeg(stores[i].buyDays - 1); save(); render(); }

function itemsPlus(i){
  const numStr = prompt("追加する個数は？（数字）", "1");
  if(numStr !== null && String(numStr).trim() !== ""){
    const n = clampNonNeg(parseInt(numStr,10));
    openCategoryModal(i, n, "カテゴリ選択（個数＋）");
  }
}
function itemsMinus(i){
  const numStr = prompt("減らす個数は？（数字）", "1");
  if(numStr !== null && String(numStr).trim() !== ""){
    const n = clampNonNeg(parseInt(numStr,10));
    openCategoryModal(i, -n, "カテゴリ選択（個数−）");
  }
}

function profitPlus(i){
  const yen = prompt("追加する利益（円）は？（数字）", "1000");
  if(yen !== null && String(yen).trim() !== ""){
    stores[i].profit += clampNonNeg(parseInt(yen,10));
  }
  save(); render();
}
function profitMinus(i){
  const yen = prompt("減らす利益（円）は？（数字）", "1000");
  if(yen !== null && String(yen).trim() !== ""){
    stores[i].profit = clampNonNeg(stores[i].profit - clampNonNeg(parseInt(yen,10)));
  }
  save(); render();
}

// 設定（現在値入り / クイック最大12）
function editStore(i){
  const s = stores[i];

  const newName = prompt("店舗名（現在値入り）", s.name || "");
  if(newName === null) return;
  const nameTrim = String(newName).trim();
  if(!nameTrim) return;

  const newPref = prompt("都道府県（現在値入り・空欄OK）", (s.pref||"").trim());
  if(newPref === null) return;

  const newUrl = prompt("GoogleマップURL（現在値入り・空欄OK）", (s.mapUrl||"").trim());
  if(newUrl === null) return;

  const newDefaultCat = prompt("デフォルトカテゴリ（現在値入り・空欄OK）", (s.defaultCategory||"").trim());
  if(newDefaultCat === null) return;

  const newQuick = prompt("よく使うカテゴリ（/区切り、最大12）", (s.quickCategories||[]).join("/"));
  if(newQuick === null) return;

  let lat=s.lat,lng=s.lng;
  const urlTrim = String(newUrl).trim();
  if(urlTrim){
    const c = extractLatLng(urlTrim);
    if(!c){
      alert("URLから座標が取れませんでした。\n「共有→リンクをコピー」したURLを貼ってください。");
      return;
    }
    lat=c.lat; lng=c.lng;
  } else {
    lat=null; lng=null;
  }

  s.name = nameTrim;
  s.pref = String(newPref).trim();
  s.mapUrl = urlTrim;
  s.lat = lat; s.lng = lng;
  s.defaultCategory = String(newDefaultCat).trim();
  s.quickCategories = String(newQuick).split("/").map(x=>x.trim()).filter(Boolean).slice(0,QUICK_LIMIT);

  save(); render();
}

function deleteStore(i){
  const ok = confirm(`「${stores[i].name}」を削除しますか？\n（データは戻せません）`);
  if(!ok) return;
  stores.splice(i,1);
  save(); render();
}

/** ===== 指標 ===== */
function calcMetrics(s){
  const visits = clampNonNeg(s.visits);
  const success = clampNonNeg(s.buyDays);
  const items = clampNonNeg(s.items);
  const profit = clampNonNeg(s.profit);

  const rate = visits > 0 ? (success / visits) * 100 : 0;
  const avgProfit = success > 0 ? (profit / success) : 0;
  const expected = (rate/100) * avgProfit;
  const profitPerItem = items > 0 ? (profit / items) : 0;

  return {visits, success, items, profit, rate, avgProfit, expected, profitPerItem};
}

/** ===== 距離 ===== */
function distanceKm(lat1,lng1,lat2,lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

function optimizeRoute(){
  if(!navigator.geolocation){
    alert("この端末では位置情報が使えません。");
    return;
  }
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      lastPos = {lat: pos.coords.latitude, lng: pos.coords.longitude};
      document.getElementById("sortType").value = "route";
      render();
    },
    ()=>{
      alert("位置情報が取得できませんでした。\niPhone設定 > プライバシー > 位置情報サービス で許可を確認してください。");
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

/** ===== フィルタ ===== */
function buildPrefFilter(){
  const prefSet = new Set();
  stores.forEach(s => { if((s.pref||"").trim()) prefSet.add(s.pref.trim()); });
  const prefs = Array.from(prefSet).sort((a,b)=>a.localeCompare(b,'ja'));

  const sel = document.getElementById("prefFilter");
  const current = sel.value || "__ALL__";
  sel.innerHTML = "";
  sel.innerHTML += `<option value="__ALL__">全て（都道府県ごと表示）</option>`;
  prefs.forEach(p=>{
    sel.innerHTML += `<option value="${escapeHtmlAttr(p)}">${escapeHtml(p)}</option>`;
  });

  if(Array.from(sel.options).some(o=>o.value===current)) sel.value = current;
  else sel.value="__ALL__";
}

function matchesQuery(s, q){
  if(!q) return true;
  const cats = Object.keys(s.categoryCounts || {}).join(" ");
  const qcats = (s.quickCategories||[]).join(" ");
  const t = (s.name + " " + (s.pref||"") + " " + (s.defaultCategory||"") + " " + qcats + " " + cats).toLowerCase();
  return t.includes(q.toLowerCase());
}

/** ===== 描画 ===== */
function render(){
  buildPrefFilter();

  document.getElementById("layoutDetail").classList.toggle("active", layout==="detail");
  document.getElementById("layoutCompact").classList.toggle("active", layout==="compact");
  document.getElementById("layoutList").classList.toggle("active", layout==="list");
  document.getElementById("layoutAnalysis").classList.toggle("active", layout==="analysis");

  const filter = document.getElementById("prefFilter").value;
  const q = (document.getElementById("q").value || "").trim();
  const minExpected = clampNonNeg(parseFloat(document.getElementById("minExpected").value || "0"));
  const minRate = clampNonNeg(parseFloat(document.getElementById("minRate").value || "0"));
  const sortType = document.getElementById("sortType").value;

  // idxを必ず持たせる（バグ防止）
  let view = stores.map((s, idx) => {
    const m = calcMetrics(s);
    let dist=null, score=null;
    if(lastPos && typeof s.lat === "number" && typeof s.lng === "number"){
      dist = distanceKm(lastPos.lat,lastPos.lng,s.lat,s.lng);
      score = m.expected / (dist + 0.2);
    }
    return {...s, _idx: idx, _m: m, _dist: dist, _score: score};
  })
  .filter(s => matchesQuery(s, q))
  .filter(s => s._m.expected >= minExpected && s._m.rate >= minRate);

  // 検索中は検索優先。検索してない時だけ都道府県フィルタ適用
  if(!q && filter !== "__ALL__"){
    view = view.filter(s => (s.pref||"").trim() === filter);
  }

  // group
  const grouped = new Map();
  if(q){
    grouped.set("検索結果", view);
  } else if(filter === "__ALL__"){
    view.forEach(s=>{
      const key = (s.pref||"").trim() || "（未設定）";
      if(!grouped.has(key)) grouped.set(key, []);
      grouped.get(key).push(s);
    });
  } else {
    grouped.set(filter, view);
  }

  // sort inside group
  for(const [k, arr] of grouped.entries()){
    arr.sort((a,b)=>{
      if(sortType === "route"){
        const as = (typeof a._score === "number") ? a._score : -Infinity;
        const bs = (typeof b._score === "number") ? b._score : -Infinity;
        if(bs !== as) return bs - as;
        return b._m.expected - a._m.expected;
      }
      if(sortType === "rate") return b._m.rate - a._m.rate;
      if(sortType === "avgProfit") return b._m.avgProfit - a._m.avgProfit;
      if(sortType === "visits") return b._m.visits - a._m.visits;
      return b._m.expected - a._m.expected;
    });
  }

  const list = document.getElementById("storeList");
  list.innerHTML = "";

  Array.from(grouped.keys()).forEach(groupKey=>{
    const arr = grouped.get(groupKey) || [];
    if(arr.length===0) return;

    list.innerHTML += `<div class="sectionTitle">${escapeHtml(groupKey)}</div>`;

    arr.forEach(s=>{
      const i = s._idx;
      const m = s._m;
      const distText = (typeof s._dist === "number") ? `${s._dist.toFixed(1)}km` : "—";
      const scoreText = (typeof s._score === "number") ? `${Math.round(s._score)} /km` : "—";
      const catSum = categorySummary(s);

      const header = `
        <div class="strong">
          ${escapeHtml(s.name)}
          <span class="badge">${escapeHtml((s.pref||"").trim() || "未設定")}</span>
          ${(s.defaultCategory||"").trim() ? `<span class="badge">カテゴリ:${escapeHtml(s.defaultCategory.trim())}</span>` : ""}
        </div>
      `;

      if(layout === "list"){
        list.innerHTML += `
          <div class="store">
            ${header}
            <div class="kv">
              <div class="pill"><b>期待値</b> ${Math.round(m.expected).toLocaleString()}円</div>
              <div class="pill"><b>距離</b> ${distText}</div>
              <div class="pill"><b>スコア</b> ${scoreText}</div>
              <div class="pill"><b>個数</b> ${m.items}個${escapeHtml(catSum)}</div>
            </div>
            <div class="grid" style="margin-top:10px;">
              <button class="smallbtn neutral" onclick="editStore(${i})">設定</button>
              <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
            </div>
          </div>
        `;
        return;
      }

      if(layout === "analysis"){
        list.innerHTML += `
          <div class="store">
            ${header}
            <div class="kv">
              <div class="pill"><b>期待値</b> ${Math.round(m.expected).toLocaleString()}円</div>
              <div class="pill"><b>成功率</b> ${m.rate.toFixed(1)}%</div>
              <div class="pill"><b>平均利益</b> ${Math.round(m.avgProfit).toLocaleString()}円</div>
              <div class="pill"><b>距離</b> ${distText}</div>
              <div class="pill"><b>スコア</b> ${scoreText}</div>
              <div class="pill"><b>個数</b> ${m.items}個${escapeHtml(catSum)}</div>
            </div>
            <div class="gray" style="margin-top:8px;">※ スコア＝期待値÷距離</div>
            <div class="grid" style="margin-top:10px;">
              <button class="smallbtn neutral" onclick="editStore(${i})">設定</button>
              <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
            </div>
          </div>
        `;
        return;
      }

      if(layout === "compact"){
        list.innerHTML += `
          <div class="store">
            ${header}
            <div class="kv">
              <div class="pill"><b>期待値</b> ${Math.round(m.expected).toLocaleString()}円</div>
              <div class="pill"><b>成功率</b> ${m.rate.toFixed(1)}%</div>
              <div class="pill"><b>距離</b> ${distText}</div>
              <div class="pill"><b>スコア</b> ${scoreText}</div>
              <div class="pill"><b>個数</b> ${m.items}個${escapeHtml(catSum)}</div>
              <div class="pill"><b>訪問</b> ${m.visits}</div>
              <div class="pill"><b>成功</b> ${m.success}</div>
            </div>
            <div class="grid" style="margin-top:10px;">
              <button class="smallbtn" onclick="visit(${i})">訪問＋</button>
              <button class="smallbtn danger" onclick="visitMinus(${i})">訪問−</button>
              <button class="smallbtn" onclick="boughtPlus(${i})">成功＋</button>
              <button class="smallbtn danger" onclick="boughtMinus(${i})">成功−</button>
              <button class="smallbtn" onclick="itemsPlus(${i})">個数＋</button>
              <button class="smallbtn danger" onclick="itemsMinus(${i})">個数−</button>
              <button class="smallbtn neutral" onclick="editStore(${i})">設定</button>
              <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
            </div>
          </div>
        `;
        return;
      }

      // detail
      list.innerHTML += `
        <div class="store">
          ${header}
          <div class="meta">
            訪問回数：${m.visits}回<br>
            成功回数：${m.success}回<br>
            総仕入れ個数：${m.items}個 ${escapeHtml(catSum)}<br>
            合計利益：${m.profit.toLocaleString()}円<br>
            成功率：${m.rate.toFixed(1)}%<br>
            平均利益（1回）：${Math.round(m.avgProfit).toLocaleString()}円<br>
            <span class="strong">期待値（1訪問あたり）：${Math.round(m.expected).toLocaleString()}円</span><br>
            1商品あたり利益：${Math.round(m.profitPerItem).toLocaleString()}円<br>
            距離：${distText} / ルートスコア：${scoreText}
          </div>

          <div class="grid" style="margin-top:10px;">
            <button class="smallbtn" onclick="visit(${i})">訪問＋</button>
            <button class="smallbtn danger" onclick="visitMinus(${i})">訪問−</button>

            <button class="smallbtn" onclick="boughtPlus(${i})">成功＋（カテゴリ選択）</button>
            <button class="smallbtn danger" onclick="boughtMinus(${i})">成功−</button>

            <button class="smallbtn" onclick="itemsPlus(${i})">個数＋（カテゴリ選択）</button>
            <button class="smallbtn danger" onclick="itemsMinus(${i})">個数−（カテゴリ選択）</button>

            <button class="smallbtn" onclick="profitPlus(${i})">利益＋</button>
            <button class="smallbtn danger" onclick="profitMinus(${i})">利益−</button>

            <button class="smallbtn neutral" onclick="editStore(${i})">設定（クイック最大12）</button>
            <button class="smallbtn danger" onclick="deleteStore(${i})">削除</button>
          </div>

          <div class="gray" style="margin-top:8px;">
            ※ カテゴリボタン最大24（クイック最大12）
          </div>
        </div>
      `;
    });
  });

  if(list.innerHTML.trim() === ""){
    list.innerHTML = `<div class="gray" style="margin-top:14px;">該当する店舗がありません。</div>`;
  }
}

/** ===== XSS対策 ===== */
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeHtmlAttr(str){
  return escapeHtml(str).replaceAll("`","&#096;");
}

render();
</script>

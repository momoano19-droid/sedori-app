<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>せどり管理PRO MAX</title>
<style>
body{font-family:-apple-system;padding:20px;background:#f4f6f8;}
h1{font-size:20px;}
input,select,button{padding:8px;margin:5px 0;width:100%;font-size:14px;}
button{background:#007aff;color:white;border:none;border-radius:8px;}
.small{font-size:13px;color:gray;}
.card{background:white;padding:12px;margin-top:10px;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
.row{display:flex;gap:6px;}
.row>*{flex:1;}
.mode button{background:#e0e5ef;color:#111;}
.mode button.active{background:#007aff;color:white;}
.highlight{font-weight:bold;font-size:18px;}
</style>
</head>
<body>

<h1>せどり管理 PRO MAX</h1>

<input id="storeName" placeholder="店舗名">
<input id="prefName" placeholder="都道府県">
<button onclick="addStore()">店舗追加</button>

<div class="mode row">
<button onclick="setMode('detail')" id="m1">詳細</button>
<button onclick="setMode('compact')" id="m2">コンパクト</button>
<button onclick="setMode('list')" id="m3">リスト</button>
<button onclick="setMode('analysis')" id="m4">分析</button>
</div>

<select id="sortType" onchange="render()">
<option value="expected">期待値順</option>
<option value="rate">成功率順</option>
<option value="avg">平均利益順</option>
<option value="visits">訪問回数順</option>
</select>

<div class="row">
<input id="minExpected" placeholder="期待値○円以上">
<input id="minRate" placeholder="成功率○％以上">
</div>

<div id="list"></div>

<script>
let stores=JSON.parse(localStorage.getItem("stores"))||[];
let mode=localStorage.getItem("mode")||"detail";

function save(){localStorage.setItem("stores",JSON.stringify(stores));}
function setMode(m){mode=m;localStorage.setItem("mode",m);render();}

function addStore(){
let name=document.getElementById("storeName").value;
let pref=document.getElementById("prefName").value;
if(!name)return;
stores.push({name,pref,visits:0,buy:0,items:0,profit:0});
save();render();
}

function metrics(s){
let rate=s.visits? (s.buy/s.visits)*100:0;
let avg=s.buy? s.profit/s.buy:0;
let expected=(rate/100)*avg;
return{rate,avg,expected};
}

function render(){
document.querySelectorAll(".mode button").forEach(b=>b.classList.remove("active"));
document.getElementById("m"+["detail","compact","list","analysis"].indexOf(mode)+1)?.classList.add("active");

let sort=document.getElementById("sortType").value;
let minExp=parseFloat(document.getElementById("minExpected").value)||0;
let minRate=parseFloat(document.getElementById("minRate").value)||0;

let arr=[...stores].map(s=>({...s,...metrics(s)}))
.filter(s=>s.expected>=minExp&&s.rate>=minRate);

arr.sort((a,b)=>{
if(sort==="rate")return b.rate-a.rate;
if(sort==="avg")return b.avg-a.avg;
if(sort==="visits")return b.visits-a.visits;
return b.expected-a.expected;
});

let html="";
arr.forEach((s,i)=>{
if(mode==="list"){
html+=`<div class="card">${s.name} - <b>${Math.round(s.expected)}円</b></div>`;
return;
}
if(mode==="analysis"){
html+=`<div class="card">
<b>${s.name}</b><br>
<div class="highlight">${Math.round(s.expected)}円</div>
成功率 ${s.rate.toFixed(1)}%<br>
平均利益 ${Math.round(s.avg)}円
</div>`;
return;
}
if(mode==="compact"){
html+=`<div class="card">
<b>${s.name}</b>
期待値 ${Math.round(s.expected)}円
成功率 ${s.rate.toFixed(1)}%
</div>`;
return;
}
html+=`<div class="card">
<b>${s.name}</b><br>
訪問 ${s.visits} 成功 ${s.buy}<br>
利益 ${s.profit}円<br>
成功率 ${s.rate.toFixed(1)}%<br>
期待値 ${Math.round(s.expected)}円
</div>`;
});
document.getElementById("list").innerHTML=html;
}

render();
</script>
</body>
</html>

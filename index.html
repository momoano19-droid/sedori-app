<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどりGPS管理PRO</title>

<style>
:root{
  --btn-font:16px;
  --btn-pad:10px;
  --btn-radius:10px;
}
body{font-family:-apple-system;padding:16px;background:#f4f6f8;}
h1{font-size:20px;margin-bottom:10px;}

input,select,button{
  padding:var(--btn-pad);
  font-size:var(--btn-font);
  border-radius:var(--btn-radius);
  border:none;
  width:100%;
  margin:6px 0;
  box-sizing:border-box;
}
button{background:#007aff;color:white;}
button.secondary{background:#e9eef6;color:#111;}
button.danger{background:#ff3b30;}
.store{background:#fff;padding:14px;border-radius:12px;margin-top:14px;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
.storeTitle{font-size:24px;font-weight:900;margin-bottom:6px;}
.badge{background:#eef2f7;padding:2px 8px;border-radius:999px;font-size:12px;margin-right:6px;}
.kv{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pill{background:#f0f3f8;padding:6px 10px;border-radius:999px;font-size:13px;}
</style>
</head>

<body>

<h1>せどりGPS管理PRO</h1>

<div>
<input id="storeName" placeholder="店舗名">
<input id="prefName" placeholder="都道府県">
<input id="mapUrl" placeholder="GoogleマップURL">
<button onclick="addStore()">店舗追加</button>
</div>

<div>
<button onclick="optimizeRoute()">現在地取得＆効率更新</button>
<select id="sortType" onchange="render()">
<option value="expected">期待値順</option>
<option value="route">ルート効率順</option>
</select>
</div>

<div id="storeList"></div>

<script>
let stores=JSON.parse(localStorage.getItem("stores")||"[]");
let lastPos=null;

function save(){localStorage.setItem("stores",JSON.stringify(stores));}

function extractLatLng(url){
  if(!url)return null;
  let m=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m)return{lat:parseFloat(m[1]),lng:parseFloat(m[2])};
  return null;
}

function addStore(){
  const name=storeName.value.trim();
  if(!name)return;
  const pref=prefName.value.trim();
  const url=mapUrl.value.trim();

  let lat=null,lng=null;
  const c=extractLatLng(url);
  if(c){lat=c.lat;lng=c.lng;}

  stores.push({
    name,pref,
    visits:0,buyDays:0,profit:0,
    lat,lng
  });

  storeName.value="";
  prefName.value="";
  mapUrl.value="";
  save();render();
}

function distanceKm(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLng=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function optimizeRoute(){
  navigator.geolocation.getCurrentPosition(pos=>{
    lastPos={lat:pos.coords.latitude,lng:pos.coords.longitude};
    render();
  });
}

function render(){
  const sortType=document.getElementById("sortType").value;

  let view=stores.map((s,i)=>{
    const visits=s.visits||0;
    const success=s.buyDays||0;
    const profit=s.profit||0;

    const rate=visits>0?(success/visits)*100:0;
    const avg=success>0?(profit/success):0;
    const expected=(rate/100)*avg;

    let dist=null,score=null;
    if(lastPos && s.lat){
      dist=distanceKm(lastPos.lat,lastPos.lng,s.lat,s.lng);
      score=expected/(dist+0.3);
    }

    return {...s,_i:i,_expected:expected,_dist:dist,_score:score};
  });

  if(sortType==="route"){
    view.sort((a,b)=>(b._score||0)-(a._score||0));
  }else{
    view.sort((a,b)=>b._expected-a._expected);
  }

  const list=document.getElementById("storeList");
  list.innerHTML="";

  view.forEach(s=>{
    const distText=s._dist?`${s._dist.toFixed(1)}km`:"—";
    const scoreText=s._score?`${Math.round(s._score)} 円/km`:"—";

    list.innerHTML+=`
      <div class="store">
        <div class="storeTitle">${s.name}</div>
        <div>
          <span class="badge">${s.pref||"未設定"}</span>
        </div>
        <div class="kv">
          <div class="pill">期待値 ${Math.round(s._expected)}円</div>
          <div class="pill">距離 ${distText}</div>
          <div class="pill">ルート効率 ${scoreText}</div>
        </div>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>

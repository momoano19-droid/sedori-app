<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどりGPS管理PRO</title>

<style>
:root{
  --btn-font:16px;
  --btn-pad:10px;
  --btn-radius:10px;
}

body{font-family:-apple-system;padding:16px;background:#f4f6f8;}
h1{font-size:20px;margin-bottom:10px;}

input,select,button{
  padding:var(--btn-pad);
  font-size:var(--btn-font);
  border-radius:var(--btn-radius);
  border:none;
  width:100%;
  margin:6px 0;
}

button{background:#007aff;color:white;}
button.secondary{background:#e9eef6;color:#111;}
button.danger{background:#ff3b30;}

.store{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-top:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.storeTitle{
  font-size:24px;
  font-weight:900;
  margin-bottom:6px;
}

.toolbar{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}

.row2{display:flex;gap:8px;}
.row2>*{flex:1;}

.badge{
  background:#eef2f7;
  padding:2px 8px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
}

.pill{
  background:#f0f3f8;
  padding:6px 10px;
  border-radius:999px;
  font-size:13px;
  margin-right:6px;
}

.kv{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}

.smallbtn{width:48%;margin-top:6px;}

table{
  width:100%;
  border-collapse:collapse;
  margin-top:10px;
}
th,td{
  border-bottom:1px solid #eee;
  padding:8px;
  font-size:14px;
}
th{background:#f7f9fc;}
</style>
</head>

<body>

<h1>せどりGPS管理PRO</h1>

<div class="row2">
  <input id="storeName" placeholder="店舗名">
  <input id="prefName" placeholder="都道府県">
</div>
<input id="mapUrl" placeholder="GoogleマップURL（長いURL）">
<input id="defaultCategory" placeholder="デフォルトカテゴリ">
<button onclick="addStore()">店舗追加</button>

<!-- レイアウト切替 -->
<div class="toolbar">
  <div class="row2">
    <button onclick="setLayout('detail')">詳細</button>
    <button onclick="setLayout('compact')">コンパクト</button>
  </div>
</div>

<!-- 今日行動 -->
<div class="toolbar">
  <div class="row2">
    <button onclick="buildTodayRoute()">今日ルート作成</button>
    <select id="todayPrefSelect"></select>
  </div>
  <div class="row2">
    <button class="secondary" onclick="todayBulkOn()">都道府県ON</button>
    <button class="secondary" onclick="todayBulkOff()">都道府県OFF</button>
  </div>
  <div id="todayPlanArea"></div>
</div>

<div id="storeList"></div>

<script>
let stores = JSON.parse(localStorage.getItem("stores")||"[]");
let layout = localStorage.getItem("layout")||"detail";

function save(){
  localStorage.setItem("stores",JSON.stringify(stores));
  localStorage.setItem("layout",layout);
}

function extractLatLng(url){
  if(!url) return null;
  let m=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
  return null;
}

function addStore(){
  const name=storeName.value.trim();
  if(!name) return;

  let lat=null,lng=null;
  const c=extractLatLng(mapUrl.value);
  if(c){lat=c.lat;lng=c.lng;}

  stores.push({
    id:Date.now(),
    name,
    pref:prefName.value.trim(),
    visits:0,
    buyDays:0,
    items:0,
    profit:0,
    lat,lng,
    today:false
  });

  storeName.value="";
  prefName.value="";
  mapUrl.value="";
  defaultCategory.value="";

  save();
  render();
}

function setLayout(v){
  layout=v;
  save();
  render();
}

function buildTodayPrefSelect(){
  const sel=document.getElementById("todayPrefSelect");
  const set=new Set();
  stores.forEach(s=>{if(s.pref)set.add(s.pref)});
  sel.innerHTML="";
  sel.innerHTML+="<option value='__ALL__'>全て</option>";
  set.forEach(p=>sel.innerHTML+=`<option value="${p}">${p}</option>`);
}

function todayBulkOn(){
  const p=todayPrefSelect.value;
  stores.forEach(s=>{
    if(p==="__ALL__"||s.pref===p) s.today=true;
  });
  save();render();
}
function todayBulkOff(){
  const p=todayPrefSelect.value;
  stores.forEach(s=>{
    if(p==="__ALL__"||s.pref===p) s.today=false;
  });
  save();render();
}

function distanceKm(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLng=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function buildTodayRoute(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const start={lat:pos.coords.latitude,lng:pos.coords.longitude};

    const targets=stores.filter(s=>s.today&&s.lat);

    if(!targets.length){
      alert("今日行く店舗に座標がありません");
      return;
    }

    let route=[...targets];
    route.sort((a,b)=>{
      const da=distanceKm(start.lat,start.lng,a.lat,a.lng);
      const db=distanceKm(start.lat,start.lng,b.lat,b.lng);
      return da-db;
    });

    route=route.slice(0,30);

    let html="";
    route.forEach((s,i)=>{
      html+=`${i+1}. ${s.name}<br>`;
    });

    todayPlanArea.innerHTML=html;

  });
}

function render(){
  buildTodayPrefSelect();
  const list=document.getElementById("storeList");
  list.innerHTML="";

  stores.forEach((s,i)=>{
    list.innerHTML+=`
      <div class="store">
        <div class="storeTitle">${s.name}</div>
        <div>
          <span class="badge">${s.pref||"未設定"}</span>
        </div>
        <div style="margin-top:6px;">
          訪問:${s.visits} 成功:${s.buyDays}
        </div>
        <div class="row2">
          <button onclick="s.today=!s.today;save();render();">
            ${s.today?"今日行く✔":"今日行く"}
          </button>
          <button class="danger" onclick="stores.splice(${i},1);save();render();">削除</button>
        </div>
      </div>
    `;
  });
}

render();
</script>

</body>
</html>

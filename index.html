<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>せどりGPS管理PRO（完全版）</title>

<style>
  :root{
    --btn-font: 16px;
    --btn-pad: 10px;
    --btn-radius: 10px;
  }

  body{font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial; padding:16px; background:#f4f6f8;}
  h1{font-size:20px; margin:0 0 10px 0;}

  input,select,button{padding:10px; margin:6px 0; width:100%; font-size:16px; box-sizing:border-box;}
  button{
    background:#007aff; color:#fff; border:none;
    border-radius:var(--btn-radius);
    padding:var(--btn-pad);
    font-size:var(--btn-font);
  }
  button.secondary{background:#e9eef6; color:#123;}
  button.danger{background:#ff3b30;}
  button.neutral{background:#34c759;}

  a.linkbtn{
    display:block; width:100%; text-align:center; text-decoration:none;
    background:#e9eef6; color:#123;
    border-radius:var(--btn-radius);
    padding:var(--btn-pad);
    font-size:var(--btn-font);
  }

  .toolbar{background:#fff; border-radius:12px; padding:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-top:12px;}
  .row2{display:flex; gap:8px;}
  .row2 > *{flex:1;}
  .grid{display:flex; gap:8px; flex-wrap:wrap;}
  .smallbtn{flex:1 1 calc(50% - 8px);}

  .store{background:#fff; padding:12px; border-radius:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); margin-top:12px;}
  .storeTitle{font-size:24px; font-weight:900; line-height:1.2; margin-bottom:6px; color:#111;}
  .meta{line-height:1.6; color:#222;}
  .gray{color:#666; font-size:14px;}
  .mini{color:#667; font-size:12px;}
  .badge{display:inline-block; padding:2px 8px; border-radius:999px; background:#eef2f7; color:#334; font-size:12px; margin:4px 6px 0 0;}
  .badge.addr{background:#fff0d6; color:#6a3d00; border:1px solid #ffd59a;}
  .kv{display:flex; gap:8px; flex-wrap:wrap; margin-top:8px;}
  .pill{background:#f0f3f8; border-radius:999px; padding:6px 10px; font-size:13px;}
  .sectionTitle{font-weight:800; color:#223; margin-top:18px;}

  .checkline{display:flex; align-items:center; gap:8px; margin-top:8px;}
  .checkline input{width:auto; margin:0;}
  .checkline label{font-size:14px; color:#223;}

  table{width:100%; border-collapse:collapse; background:#fff; border-radius:12px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-top:10px;}
  th,td{padding:10px; border-bottom:1px solid #eef2f7; text-align:left; font-size:14px;}
  th{background:#f7f9fc; color:#223;}
  tr:last-child td{border-bottom:none;}

  /* modal */
  .overlay{position:fixed; left:0; top:0; right:0; bottom:0; background:rgba(0,0,0,0.35); display:none; align-items:center; justify-content:center; padding:16px; z-index:9999;}
  .modal{background:#fff; border-radius:14px; max-width:520px; width:100%; padding:14px; box-shadow:0 10px 30px rgba(0,0,0,0.25);}
  .modal h2{margin:0 0 6px 0; font-size:18px;}
  .modal .small{color:#666; font-size:13px; margin:0 0 10px 0; line-height:1.4;}
  .chips{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px;}
  .chip{
    background:#eef2f7; color:#123; border-radius:999px;
    padding:calc(var(--btn-pad) - 2px) 12px;
    font-size:calc(var(--btn-font) - 2px);
    border:1px solid #dfe6f2;
    width:auto;
  }
  .chip.primary{background:#007aff; color:#fff; border-color:#007aff;}
  .chip.gray{background:#f0f3f8; color:#444;}
  .chip.neutral{background:#34c759; color:#fff; border-color:#34c759;}
</style>
</head>

<body>
<h1>せどりGPS管理PRO（完全版）</h1>

<div class="row2">
  <input id="storeName" placeholder="店舗名を入力">
  <input id="prefName" placeholder="都道府県（例：茨城県）">
</div>

<input id="address" placeholder="住所（任意：入れるとマーク表示）">
<input id="mapUrl" placeholder="GoogleマップURL（Safariで開いた長いURLを貼る）">
<input id="defaultCategory" placeholder="デフォルトカテゴリ（例：本 / 家電）">
<button onclick="addStore()">店舗追加</button>

<!-- 検索＆表示 -->
<div class="toolbar">
  <div class="row2">
    <input id="q" placeholder="🔎 店舗検索（店舗名/都道府県/カテゴリ/住所）" oninput="render()">
    <select id="prefFilter" onchange="render()"></select>
  </div>

  <div class="row2">
    <input id="minExpected" placeholder="期待値 下限（例：2000）" oninput="render()">
    <input id="minRate" placeholder="成功率 下限%（例：30）" oninput="render()">
  </div>

  <div class="row2">
    <select id="sortType" onchange="render()">
      <option value="expected">期待値順</option>
      <option value="rate">成功率順</option>
      <option value="avgProfit">平均利益順</option>
      <option value="visits">訪問回数順</option>
      <option value="route">ルート効率順（期待値÷距離）</option>
    </select>
    <button onclick="optimizeRoute()">🚗 現在地で効率更新</button>
  </div>

  <div class="row2" style="margin-top:8px;">
    <button id="layoutDetailBtn" class="secondary" onclick="setLayout('detail')">詳細</button>
    <button id="layoutCompactBtn" class="secondary" onclick="setLayout('compact')">コンパクト</button>
  </div>
  <div class="row2">
    <button id="layoutListBtn" class="secondary" onclick="setLayout('list')">リスト</button>
    <button id="layoutAnalysisBtn" class="secondary" onclick="setLayout('analysis')">分析</button>
  </div>

  <div class="gray">
    ※ GoogleマップURLは「共有リンクをSafariで開いた後の長いURL」を貼ると座標が取れます。<br>
    ※ 「成功＋」を押すと個数入力 → カテゴリ選択でカテゴリ別個数が集計されます。
  </div>
</div>

<!-- ボタン表示設定（表示/非表示 + 保存） -->
<div class="toolbar">
  <div class="row2" style="align-items:center;">
    <div style="font-weight:800;">⚙️ ボタン表示設定</div>
    <button id="toggleBtnSettingBtn" onclick="toggleBtnSetting()">非表示</button>
  </div>

  <div id="btnSettingWrap">
    <div class="row2">
      <div>
        <div class="gray">文字サイズ</div>
        <input id="btnFont" type="range" min="12" max="24" value="16" oninput="updateBtnStyle()">
      </div>
      <div>
        <div class="gray">ボタン高さ（余白）</div>
        <input id="btnPad" type="range" min="6" max="20" value="10" oninput="updateBtnStyle()">
      </div>
    </div>

    <div>
      <div class="gray">角丸（R）</div>
      <input id="btnRadius" type="range" min="6" max="28" value="10" oninput="updateBtnStyle()">
    </div>
    <div class="gray">※ 変更は自動保存されます</div>
  </div>
</div>

<!-- 今日の行動計画 -->
<div class="toolbar">
  <div class="row2" style="align-items:center;">
    <div style="font-weight:800;">🗓 今日の行動計画</div>
    <button onclick="buildTodayRoute()">今日ルート作成</button>
  </div>

  <div class="row2" style="margin-top:8px;">
    <select id="todayPrefSelect"></select>
    <button class="secondary" onclick="todayBulkOn()">この都道府県ON</button>
  </div>
  <div class="row2">
    <button class="secondary" onclick="todayBulkOff()">この都道府県OFF</button>
    <button class="secondary" onclick="todayBulkClearAll()">全てOFF</button>
  </div>

  <div class="gray">巡回順は「期待値 ÷ (距離+0.3)」で近い×儲かるを優先。最大30店舗。Googleマップリンクは20件ずつ分割。</div>
  <div id="todayPlanArea" style="margin-top:8px;"></div>
</div>

<!-- レポート（表示/非表示 + 保存） -->
<div class="toolbar">
  <div class="row2" style="align-items:center;">
    <div style="font-weight:800;">📊 レポート</div>
    <button id="toggleReportBtn" onclick="toggleReport()">非表示</button>
  </div>

  <div id="reportWrap">
    <div class="row2" style="margin-top:8px;">
      <select id="reportMode" onchange="renderReport()">
        <option value="daily">日別（選択月）</option>
        <option value="monthly">月別（直近12ヶ月）</option>
      </select>
      <input id="reportMonth" type="month" onchange="renderReport()">
    </div>

    <div class="row2">
      <button class="secondary" onclick="setReportThisMonth()">今月</button>
      <button class="secondary" onclick="setReportLastMonth()">先月</button>
    </div>

    <div id="reportArea"></div>
  </div>
</div>

<div id="storeList"></div>

<!-- カテゴリ選択モーダル -->
<div id="overlay" class="overlay" onclick="event.stopPropagation()">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">カテゴリ選択</h2>
    <p id="modalHint" class="small"></p>

    <div id="chipArea" class="chips"></div>

    <div class="row2" style="margin-top:10px;">
      <input id="customCat" placeholder="その他：カテゴリを手入力">
      <button class="secondary" onclick="addCustomCategory()">追加</button>
    </div>

    <div class="row2" style="margin-top:10px;">
      <button class="secondary" onclick="closeModal(false)">キャンセル</button>
      <button onclick="closeModal(true)">確定</button>
    </div>
  </div>
</div>

<script>
/* ========= keys ========= */
const QUICK_LIMIT = 12;
const CHIP_LIMIT = 24;
const KEY_STORES = "stores";
const KEY_LOGS = "logs";
const KEY_LAYOUT = "layout";
const KEY_BTN_STYLE = "btnStyle";
const KEY_BTN_VISIBLE = "btn_setting_visible";
const KEY_REPORT_VISIBLE = "report_visible";

/* ========= persistence ========= */
let stores = JSON.parse(localStorage.getItem(KEY_STORES) || "[]");
let logs = JSON.parse(localStorage.getItem(KEY_LOGS) || "[]");
let layout = localStorage.getItem(KEY_LAYOUT) || "detail";
let lastPos = null;

/* ========= helpers ========= */
function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function clampNonNeg(n){ return Math.max(0, Number(n)||0); }
function ensureId(){
  return (crypto?.randomUUID ? crypto.randomUUID() : String(Date.now()) + "_" + Math.random().toString(16).slice(2));
}

/* Tokyo date */
function tokyoDateStr(d=new Date()){
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit', day:'2-digit'
  }).formatToParts(d);
  const y = parts.find(p=>p.type==='year').value;
  const m = parts.find(p=>p.type==='month').value;
  const day = parts.find(p=>p.type==='day').value;
  return `${y}-${m}-${day}`;
}
function tokyoMonthStr(d=new Date()){
  const parts = new Intl.DateTimeFormat('ja-JP', {
    timeZone:'Asia/Tokyo', year:'numeric', month:'2-digit'
  }).formatToParts(d);
  const y = parts.find(p=>p.type==='year').value;
  const m = parts.find(p=>p.type==='month').value;
  return `${y}-${m}`;
}
function addMonths(ym, delta){
  const [y,m] = ym.split('-').map(Number);
  const dt = new Date(Date.UTC(y, m-1, 1));
  dt.setUTCMonth(dt.getUTCMonth()+delta);
  return `${dt.getUTCFullYear()}-${String(dt.getUTCMonth()+1).padStart(2,'0')}`;
}
function daysInMonth(ym){
  const [y,m] = ym.split('-').map(Number);
  return new Date(y, m, 0).getDate();
}

/* ========= migrate/normalize ========= */
stores = stores.map(s => ({
  id: s.id || ensureId(),
  name: (s.name ?? "店舗").toString(),
  pref: (s.pref ?? "").toString().trim(),
  address: (s.address ?? "").toString().trim(),
  visits: Number(s.visits ?? 0),
  buyDays: Number(s.buyDays ?? 0),
  items: Number(s.items ?? 0),
  profit: Number(s.profit ?? 0),
  mapUrl: (s.mapUrl ?? "").toString().trim(),
  lat: (typeof s.lat === "number") ? s.lat : null,
  lng: (typeof s.lng === "number") ? s.lng : null,
  defaultCategory: (s.defaultCategory ?? "").toString().trim(),
  categoryCounts: (s.categoryCounts && typeof s.categoryCounts === "object") ? s.categoryCounts : {},
  quickCategories: Array.isArray(s.quickCategories) ? s.quickCategories.filter(Boolean).slice(0, QUICK_LIMIT) : [],
  lastVisitDate: (s.lastVisitDate ?? "").toString().trim(),
  today: !!s.today
}));

function saveAll(){
  localStorage.setItem(KEY_STORES, JSON.stringify(stores));
  localStorage.setItem(KEY_LOGS, JSON.stringify(logs));
  localStorage.setItem(KEY_LAYOUT, layout);
}

/* ========= logs ========= */
function addLog(storeId, type, delta, category=null){
  const rec = {date: tokyoDateStr(), storeId, type, delta: Number(delta)||0};
  if(category!==null && category!==undefined){
    const c = String(category).trim();
    if(c) rec.category = c;
  }
  logs.push(rec);
  saveAll();
}

/* ========= metrics ========= */
function calcMetrics(s){
  const visits = clampNonNeg(s.visits);
  const success = clampNonNeg(s.buyDays);
  const items = clampNonNeg(s.items);
  const profit = clampNonNeg(s.profit);

  const rate = visits>0 ? (success/visits)*100 : 0;
  const avgProfit = success>0 ? (profit/success) : 0;
  const expected = (rate/100)*avgProfit;
  const profitPerItem = items>0 ? (profit/items) : 0;

  return {visits, success, items, profit, rate, avgProfit, expected, profitPerItem};
}

/* ========= map url -> latlng ========= */
function extractLatLng(url){
  if(!url) return null;
  url = String(url).trim();

  let m = url.match(/@(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};

  m = url.match(/!3d(-?\d+(?:\.\d+)?)!4d(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};

  m = url.match(/[?&](?:q|query|ll|center)=(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};

  m = url.match(/\/dir\/[^/]*\/(-?\d+(?:\.\d+)?),\s*(-?\d+(?:\.\d+)?)/);
  if(m) return {lat: parseFloat(m[1]), lng: parseFloat(m[2])};

  return null;
}

/* ========= categories ========= */
function addItemsToCategory(i, cat, delta){
  const s = stores[i];
  const category = String(cat||"").trim();
  if(!category) return;

  if(!s.categoryCounts || typeof s.categoryCounts !== "object") s.categoryCounts = {};
  const cur = clampNonNeg(s.categoryCounts[category] ?? 0);
  const next = clampNonNeg(cur + delta);

  if(next === 0) delete s.categoryCounts[category];
  else s.categoryCounts[category] = next;

  if(!s.quickCategories) s.quickCategories = [];
  if(!s.quickCategories.includes(category)){
    s.quickCategories.unshift(category);
    s.quickCategories = s.quickCategories.slice(0, QUICK_LIMIT);
  }
  if(!s.defaultCategory) s.defaultCategory = category;
}
function getAllCategories(){
  const set = new Set();
  stores.forEach(s=>{
    const dc = (s.defaultCategory||"").trim();
    if(dc) set.add(dc);
    (s.quickCategories||[]).forEach(c=>{ c=String(c).trim(); if(c) set.add(c); });
    Object.keys(s.categoryCounts||{}).forEach(k=>{ k=String(k).trim(); if(k) set.add(k); });
  });
  return Array.from(set).sort((a,b)=>a.localeCompare(b,'ja'));
}
function categorySummary(s){
  const cc = s.categoryCounts || {};
  const keys = Object.keys(cc);
  if(!keys.length) return "";
  keys.sort((a,b)=>(cc[b]||0)-(cc[a]||0));
  const top = keys.slice(0,3).map(k => `${k}:${cc[k]}`);
  const more = keys.length>3 ? ` +${keys.length-3}` : "";
  return `（${top.join(" / ")}${more}）`;
}

/* ========= modal (category select) ========= */
let modalState = {open:false, storeIndex:null, deltaItems:0, selectedCat:""};

function openCategoryModal(storeIndex, deltaItems, title){
  const s = stores[storeIndex];
  modalState.open = true;
  modalState.storeIndex = storeIndex;
  modalState.deltaItems = deltaItems;
  modalState.selectedCat = s.defaultCategory || "";

  document.getElementById("modalTitle").textContent = title;
  document.getElementById("modalHint").textContent = `店舗：${s.name} / 個数：${deltaItems}（ボタンで選択。無ければ下で追加）`;
  document.getElementById("customCat").value = "";
  rebuildChips();

  document.getElementById("overlay").style.display = "flex";
}
function rebuildChips(){
  const area = document.getElementById("chipArea");
  area.innerHTML = "";

  const s = stores[modalState.storeIndex];
  const chips = [];

  (s.quickCategories||[]).forEach(c=>{
    c = String(c).trim();
    if(c && !chips.includes(c)) chips.push(c);
  });
  getAllCategories().forEach(c=>{
    if(chips.length >= CHIP_LIMIT) return;
    if(!chips.includes(c)) chips.push(c);
  });

  if(modalState.selectedCat && !chips.includes(modalState.selectedCat)){
    chips.unshift(modalState.selectedCat);
  }

  chips.slice(0, CHIP_LIMIT).forEach(cat=>{
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chip" + (cat===modalState.selectedCat ? " primary" : "");
    btn.textContent = cat;
    btn.onclick = () => { modalState.selectedCat = cat; rebuildChips(); };
    area.appendChild(btn);
  });

  const noneBtn = document.createElement("button");
  noneBtn.type="button";
  noneBtn.className = "chip gray" + (!modalState.selectedCat ? " primary" : "");
  noneBtn.textContent = "カテゴリなし";
  noneBtn.onclick = () => { modalState.selectedCat = ""; rebuildChips(); };
  area.appendChild(noneBtn);
}
function addCustomCategory(){
  const v = document.getElementById("customCat").value.trim();
  if(!v) return;

  modalState.selectedCat = v;
  const s = stores[modalState.storeIndex];
  if(!s.quickCategories) s.quickCategories=[];
  if(!s.quickCategories.includes(v)){
    s.quickCategories.unshift(v);
    s.quickCategories = s.quickCategories.slice(0, QUICK_LIMIT);
  }
  document.getElementById("customCat").value = "";
  rebuildChips();
}
function closeModal(commit){
  document.getElementById("overlay").style.display = "none";
  modalState.open = false;
  if(!commit) return;

  const i = modalState.storeIndex;
  const delta = modalState.deltaItems;
  const cat = modalState.selectedCat;
  const s = stores[i];

  if(delta !== 0){
    s.items = clampNonNeg(s.items + delta);
    if(cat) addItemsToCategory(i, cat, delta);
    addLog(s.id, "items", delta, cat || null);
  }
  saveAll();
  render();
  renderReport();
}

/* ========= actions ========= */
function addStore(){
  const name = document.getElementById("storeName").value.trim();
  const pref = document.getElementById("prefName").value.trim();
  const address = document.getElementById("address").value.trim();
  const url = document.getElementById("mapUrl").value.trim();
  const dc = document.getElementById("defaultCategory").value.trim();
  if(!name) return;

  let lat=null, lng=null;
  if(url){
    const c = extractLatLng(url);
    if(!c){
      alert("URLから座標が取れませんでした。\nGoogleマップ共有リンクをSafariで開いた後の『長いURL』を貼ってください。");
      return;
    }
    lat=c.lat; lng=c.lng;
  }

  const quick = [];
  if(dc) quick.push(dc);

  stores.push({
    id: ensureId(),
    name, pref,
    address,
    visits:0, buyDays:0, items:0, profit:0,
    mapUrl:url, lat, lng,
    defaultCategory: dc,
    categoryCounts:{},
    quickCategories: quick,
    lastVisitDate:"",
    today:false
  });

  document.getElementById("storeName").value="";
  document.getElementById("prefName").value="";
  document.getElementById("address").value="";
  document.getElementById("mapUrl").value="";
  document.getElementById("defaultCategory").value="";

  saveAll();
  render();
  renderReport();
  renderTodayPlan();
}

function editStore(i){
  const s = stores[i];

  const newName = prompt("店舗名（現在値入り）", s.name || "");
  if(newName===null) return;
  const nameTrim = String(newName).trim();
  if(!nameTrim) return;

  const newPref = prompt("都道府県（現在値入り・空欄OK）", (s.pref||"").trim());
  if(newPref===null) return;

  const newAddr = prompt("住所（現在値入り・空欄OK）", (s.address||"").trim());
  if(newAddr===null) return;

  const newUrl = prompt("GoogleマップURL（現在値入り・空欄OK）", (s.mapUrl||"").trim());
  if(newUrl===null) return;

  const newDefaultCat = prompt("デフォルトカテゴリ（現在値入り・空欄OK）", (s.defaultCategory||"").trim());
  if(newDefaultCat===null) return;

  const newQuick = prompt("よく使うカテゴリ（/区切り、最大12）", (s.quickCategories||[]).join("/"));
  if(newQuick===null) return;

  let lat=s.lat, lng=s.lng;
  const urlTrim = String(newUrl).trim();
  if(urlTrim){
    const c = extractLatLng(urlTrim);
    if(!c){
      alert("URLから座標が取れませんでした。\nSafariで開いた後の『長いURL』を貼ってください。");
      return;
    }
    lat=c.lat; lng=c.lng;
  } else {
    lat=null; lng=null;
  }

  s.name = nameTrim;
  s.pref = String(newPref).trim();
  s.address = String(newAddr).trim();
  s.mapUrl = urlTrim;
  s.lat = lat; s.lng = lng;
  s.defaultCategory = String(newDefaultCat).trim();
  s.quickCategories = String(newQuick).split("/").map(x=>x.trim()).filter(Boolean).slice(0, QUICK_LIMIT);

  saveAll();
  render();
  renderReport();
  renderTodayPlan();
}

function deleteStore(i){
  const ok = confirm(`「${stores[i].name}」を削除しますか？\n（データは戻せません）`);
  if(!ok) return;
  stores.splice(i,1);
  saveAll();
  render();
  renderReport();
  renderTodayPlan();
}

function toggleToday(i, checked){
  stores[i].today = !!checked;
  saveAll();
  renderTodayPlan();
}

function visit(i){

/* ========= distance ========= */
function distanceKm(lat1,lng1,lat2,lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a =
    Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)**2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R*c;
}

function optimizeRoute(){
  if(!navigator.geolocation){
    alert("この端末では位置情報が使えません。");

}

function matchesQuery(s, q){
  if(!q) return true;
  const cats = Object.keys(s.categoryCounts||{}).join(" ");
  const qcats = (s.quickCategories||[]).join(" ");
  const t = (s.name + " " + (s.pref||"") + " " + (s.address||"") + " " + (s.defaultCategory||"") + " " + qcats + " " + cats).toLowerCase();
  return t.includes(q.toLowerCase());
}

function renderTodayPlan(){

  if(todays.length===0){

    return;
  }

  const noCoord = todays.filter(s=>typeof s.lat!=="number" || typeof s.lng!=="number");
  const coordOk = todays.filter(s=>typeof s.lat==="number" && typeof s.lng==="number");

  let html = "";
  if(noCoord.length){
    html += `<div class="gray">※ 座標が無い店舗はルート作成に入れられません：${noCoord.map(s=>escapeHtml(s.name)).join(" / ")}</div>`;

    </div>
  `;
  area.innerHTML = html;
}

function buildTodayRoute(){
  if(!navigator.geolocation){
    alert("この端末では位置情報が使えません。");
    return;
  }

  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      lastPos = {lat: pos.coords.latitude, lng: pos.coords.longitude};
      const start = {lat:lastPos.lat, lng:lastPos.lng};

      const targets = stores
        .map((s,idx)=>({...s,_idx:idx,_m:calcMetrics(s)}))
        .filter(s=>s.today)
        .filter(s=>typeof s.lat==="number" && typeof s.lng==="number");

      if(targets.length===0){
        alert("今日行く店舗のうち、座標が入っている店舗がありません。\n各店舗の設定でGoogleマップURL（長いURL）を入れてください。");
        renderTodayPlan();
        return;
      }

      const remaining = targets.slice();
      const route = [];
      let cur = start;

      while(remaining.length){
        let bestIdx = 0;
        let bestScore = -Infinity;

        for(let i=0;i<remaining.length;i++){
          const dist = distanceKm(cur.lat, cur.lng, remaining[i].lat, remaining[i].lng);
          const expected = remaining[i]._m.expected || 0;
          const score = expected / (dist + 0.3); // 円/km
          if(score > bestScore){
            bestScore = score;
            bestIdx = i;
          }
        }

        const next = remaining.splice(bestIdx,1)[0];
        next._fromDist = distanceKm(cur.lat, cur.lng, next.lat, next.lng);
        next._eff = (next._m.expected || 0) / (next._fromDist + 0.3); // 参考：直前区間での効率
        route.push(next);
        cur = {lat: next.lat, lng: next.lng};
      }

      const routeLimited = route.slice(0, 30);

      const totalExpected = routeLimited.reduce((sum,s)=>sum + (s._m.expected||0), 0);
      const totalDist = routeLimited.reduce((sum,s)=>sum + (s._fromDist||0), 0);

      const area = document.getElementById("todayPlanArea");
      let html = `
        <div class="kv">
          <div class="pill"><b>巡回</b> ${routeLimited.length} / ${route.length}（最大30）</div>
          <div class="pill"><b>推定移動距離</b> ${totalDist.toFixed(1)}km</div>
          <div class="pill"><b>予想総利益</b> ${Math.round(totalExpected).toLocaleString()}円</div>
        </div>

        <table>
          <thead><tr><th>#</th><th>店舗</th><th>距離</th><th>期待値</th><th>ルート効率</th><th>操作</th></tr></thead>
          <tbody>
            ${routeLimited.map((s,i)=>`
              <tr>
                <td>${i+1}</td>
                <td>${escapeHtml(s.name)}</td>
                <td>${(s._fromDist||0).toFixed(1)}km</td>
                <td>${Math.round(s._m.expected||0).toLocaleString()}円</td>
                <td>${Number.isFinite(s._eff) ? `${Math.round(s._eff).toLocaleString()} 円/km` : "—"}</td>
                <td><button class="chip neutral" onclick="visit(${s._idx})" style="width:auto;">訪問＋</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;

      const chunkSize = 20;
      const chunks = [];
      for(let i=0;i<routeLimited.length;i+=chunkSize){
        chunks.push(routeLimited.slice(i, i+chunkSize));
      }

      chunks.forEach((chunk, index)=>{
        const origin = `${start.lat},${start.lng}`;
        const destination = `${chunk[chunk.length-1].lat},${chunk[chunk.length-1].lng}`;
        const waypoints = chunk.slice(0, chunk.length-1).map(s=>`${s.lat},${s.lng}`).join("|");

        const url = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(origin)}&destination=${encodeURIComponent(destination)}${waypoints?`&waypoints=${encodeURIComponent(waypoints)}`:""}&travelmode=driving`;

        html += `
          <div style="margin-top:10px;">
            <a class="linkbtn" href="${url}" target="_blank" rel="noopener">🧭 ルート${index+1}をGoogleマップで開く（${chunk.length}件）</a>
          </div>
        `;
      });

      html += `<div class="mini" style="margin-top:8px;">※ ルートに入れる店が多い場合は「今日行く」を整理して回すのが最強です。</div>`;
      area.innerHTML = html;
    },
    ()=>{
      alert("位置情報が取得できませんでした。\niPhone設定 > プライバシー > 位置情報サービス で許可を確認してください。");
    },
    {enableHighAccuracy:true, timeout:10000}
  );
}

function monthRangeDates(month){
  const dim = daysInMonth(month);
  const dates = [];
  for(let d=1; d<=dim; d++){
    dates.push(`${month}-${String(d).padStart(2,'0')}`);
  }
  return dates;
}
function sumLogsByDate(dates){
  const map = new Map();
  dates.forEach(d=>map.set(d,{visit:0,success:0,items:0,profit:0}));
  logs.forEach(l=>{
    if(!map.has(l.date)) return;
    const row = map.get(l.date);
    if(l.type==="visit") row.visit += l.delta;
    if(l.type==="success") row.success += l.delta;
    if(l.type==="items") row.items += l.delta;
    if(l.type==="profit") row.profit += l.delta;
  });
  return map;
}
function sumLogsByMonth(months){
  const map = new Map();
  months.forEach(m=>map.set(m,{visit:0,success:0,items:0,profit:0}));
  logs.forEach(l=>{
    const m = l.date.slice(0,7);
    if(!map.has(m)) return;
    const row = map.get(m);
    if(l.type==="visit") row.visit += l.delta;
    if(l.type==="success") row.success += l.delta;
    if(l.type==="items") row.items += l.delta;
    if(l.type==="profit") row.profit += l.delta;
  });
  return map;
}

function categoryTotalsForDates(dateSet){
  const totals = new Map();
  logs.forEach(l=>{
    if(l.type!=="items") return;
    if(!l.category) return;
    if(!dateSet.has(l.date)) return;
    const cat = String(l.category).trim();
    if(!cat) return;
    totals.set(cat, (totals.get(cat)||0) + (Number(l.delta)||0));
  });
  for(const [k,v] of Array.from(totals.entries())){
    if(v<=0) totals.delete(k);
  }
  return Array.from(totals.entries()).sort((a,b)=>b[1]-a[1]);
}
function categoryTotalsForMonths(monthSet){
  const totals = new Map();
  logs.forEach(l=>{
    if(l.type!=="items") return;
    if(!l.category) return;
    const m = l.date.slice(0,7);
    if(!monthSet.has(m)) return;
    const cat = String(l.category).trim();
    if(!cat) return;
    totals.set(cat, (totals.get(cat)||0) + (Number(l.delta)||0));
  });
  for(const [k,v] of Array.from(totals.entries())){
    if(v<=0) totals.delete(k);
  }
  return Array.from(totals.entries()).sort((a,b)=>b[1]-a[1]);
}
function renderCategoryReportBlock(title, rows){
  if(rows.length===0){
    return `<div class="gray" style="margin-top:10px;">${escapeHtml(title)}：データなし（個数＋/成功＋でカテゴリを選ぶと貯まります）</div>`;
  }
  const total = rows.reduce((s,r)=>s+r[1],0);
  const top = rows.slice(0,20);
  return `
    <div class="sectionTitle">${escapeHtml(title)}</div>
    <div class="kv">
      <div class="pill"><b>カテゴリ数</b> ${rows.length}</div>
      <div class="pill"><b>合計個数</b> ${total}</div>
      <div class="pill"><b>TOP</b> ${escapeHtml(top[0][0])}（${top[0][1]}）</div>
    </div>
    <table>
      <thead><tr><th>カテゴリ</th><th>個数</th></tr></thead>
      <tbody>
        ${top.map(([cat,cnt])=>`<tr><td>${escapeHtml(cat)}</td><td>${cnt}</td></tr>`).join("")}
      </tbody>
    </table>
    <div class="mini">※ 上位20カテゴリのみ表示</div>
  `;
}

function renderReport(){
  const mode = document.getElementById("reportMode").value;
  const month = document.getElementById("reportMonth").value || tokyoMonthStr();
  document.getElementById("reportMonth").value = month;

  const area = document.getElementById("reportArea");
  area.innerHTML = "";

  if(mode==="daily"){
    const dates = monthRangeDates(month);
    const map = sumLogsByDate(dates);

    let tV=0,tS=0,tI=0,tP=0;
    dates.forEach(d=>{
      const r = map.get(d);
      tV+=r.visit; tS+=r.success; tI+=r.items; tP+=r.profit;
    });

    const dateSet = new Set(dates);
    const catRows = categoryTotalsForDates(dateSet);

    area.innerHTML = `
      <div class="kv">
        <div class="pill"><b>対象月</b> ${escapeHtml(month)}</div>
        <div class="pill"><b>訪問</b> ${tV}</div>
        <div class="pill"><b>成功</b> ${tS}</div>
        <div class="pill"><b>個数</b> ${tI}</div>
        <div class="pill"><b>利益</b> ${Number(tP).toLocaleString()}円</div>
      </div>
      <table>
        <thead><tr><th>日付</th><th>訪問</th><th>成功</th><th>個数</th><th>利益</th></tr></thead>
        <tbody>
          ${dates.map(d=>{
            const r = map.get(d);
            return `<tr><td>${escapeHtml(d)}</td><td>${r.visit}</td><td>${r.success}</td><td>${r.items}</td><td>${Number(r.profit).toLocaleString()}円</td></tr>`;
          }).join("")}
        </tbody>
      </table>
      ${renderCategoryReportBlock("カテゴリ別仕入れ個数（選択月）", catRows)}
    `;
    return;
  }

  const months = [];
  for(let i=11;i>=0;i--) months.push(addMonths(month, -i));
  const map = sumLogsByMonth(months);

  let tV=0,tS=0,tI=0,tP=0;
  months.forEach(m=>{
    const r = map.get(m);
    tV+=r.visit; tS+=r.success; tI+=r.items; tP+=r.profit;
  });

  const monthSet = new Set(months);
  const catRows = categoryTotalsForMonths(monthSet);

  area.innerHTML = `
    <div class="kv">
      <div class="pill"><b>基準月</b> ${escapeHtml(month)}</div>
      <div class="pill"><b>12ヶ月訪問</b> ${tV}</div>
      <div class="pill"><b>12ヶ月成功</b> ${tS}</div>
      <div class="pill"><b>12ヶ月個数</b> ${tI}</div>
      <div class="pill"><b>12ヶ月利益</b> ${Number(tP).toLocaleString()}円</div>
    </div>
    <table>
      <thead><tr><th>月</th><th>訪問</th><th>成功</th><th>個数</th><th>利益</th></tr></thead>
      <tbody>
        ${months.map(m=>{
          const r = map.get(m);
          return `<tr><td>${escapeHtml(m)}</td><td>${r.visit}</td><td>${r.success}</td><td>${r.items}</td><td>${Number(r.profit).toLocaleString()}円</td></tr>`;
        }).join("")}
      </tbody>
    </table>
    ${renderCategoryReportBlock("カテゴリ別仕入れ個数（直近12ヶ月合計）", catRows)}
  `;
}

/* ========= toggles (with persistence) ========= */
function updateBtnStyle(){
  const font = Number(document.getElementById("btnFont").value || 16);
  const pad  = Number(document.getElementById("btnPad").value || 10);
  const rad  = Number(document.getElementById("btnRadius").value || 10);

  document.documentElement.style.setProperty("--btn-font", font + "px");
  document.documentElement.style.setProperty("--btn-pad", pad + "px");
  document.documentElement.style.setProperty("--btn-radius", rad + "px");

  localStorage.setItem(KEY_BTN_STYLE, JSON.stringify({font, pad, rad}));
}
function loadBtnStyle(){
  try{
    const s = JSON.parse(localStorage.getItem(KEY_BTN_STYLE) || "{}");
    const font = Number(s.font || 16);
    const pad  = Number(s.pad  || 10);
    const rad  = Number(s.rad  || 10);

    document.getElementById("btnFont").value = font;
    document.getElementById("btnPad").value = pad;
    document.getElementById("btnRadius").value = rad;

    document.documentElement.style.setProperty("--btn-font", font + "px");
    document.documentElement.style.setProperty("--btn-pad", pad + "px");
    document.documentElement.style.setProperty("--btn-radius", rad + "px");
  }catch(e){}
}

function toggleBtnSetting(){
  const cur = localStorage.getItem(KEY_BTN_VISIBLE);
  const next = (cur === "0") ? "1" : "0";
  localStorage.setItem(KEY_BTN_VISIBLE, next);
  applyBtnSettingVisibility();
}
function applyBtnSettingVisibility(){
  const visible = (localStorage.getItem(KEY_BTN_VISIBLE) ?? "1") !== "0";
  document.getElementById("btnSettingWrap").style.display = visible ? "block" : "none";
  document.getElementById("toggleBtnSettingBtn").textContent = visible ? "非表示" : "表示";
}

function toggleReport(){
  const cur = localStorage.getItem(KEY_REPORT_VISIBLE);
  const next = (cur === "0") ? "1" : "0";
  localStorage.setItem(KEY_REPORT_VISIBLE, next);
  applyReportVisibility();
}
function applyReportVisibility(){
  const visible = (localStorage.getItem(KEY_REPORT_VISIBLE) ?? "1") !== "0";
  document.getElementById("reportWrap").style.display = visible ? "block" : "none";
  document.getElementById("toggleReportBtn").textContent = visible ? "非表示" : "表示";
}

/* ========= init ========= */
(function init(){
  document.getElementById("reportMonth").value = tokyoMonthStr();
  loadBtnStyle();
  applyBtnSettingVisibility();
  applyReportVisibility();
  render();
  renderReport();
  renderTodayPlan();
})();
</script>

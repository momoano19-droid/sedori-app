<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどりGPS管理PRO</title>

<style>
body{
font-family:-apple-system;
background:#f4f6f8;
padding:20px;
}

.store{
background:white;
padding:14px;
border-radius:12px;
margin-top:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.storeTitle{
font-size:22px;
font-weight:700;
}

.sectionTitle{
font-weight:700;
margin-top:20px;
font-size:18px;
}

button{
padding:10px;
font-size:16px;
border:none;
border-radius:10px;
background:#007aff;
color:white;
width:100%;
margin-top:6px;
}

.secondary{
background:#e9eef6;
color:#111;
}

input{
width:100%;
padding:10px;
font-size:16px;
margin-top:6px;
border-radius:10px;
border:1px solid #ddd;
}

.meta{
margin-top:6px;
font-size:14px;
line-height:1.5;
}

</style>
</head>

<body>

<h1>せどりGPS管理PRO</h1>

<input id="storeName" placeholder="店舗名">
<input id="prefName" placeholder="都道府県">
<input id="mapUrl" placeholder="GoogleマップURL">

<button onclick="addStore()">店舗追加</button>

<button onclick="showNearbyStores()">📍近くの店舗（3km）</button>

<div id="storeList"></div>

<script>

let stores = JSON.parse(localStorage.getItem("stores")||"[]")

function save(){
localStorage.setItem("stores",JSON.stringify(stores))
}

function extractLatLng(url){

if(!url) return null

let m=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/)

if(m){
return{
lat:parseFloat(m[1]),
lng:parseFloat(m[2])
}
}

return null
}

function addStore(){

const name=document.getElementById("storeName").value.trim()
const pref=document.getElementById("prefName").value.trim()
const url=document.getElementById("mapUrl").value.trim()

if(!name) return

let lat=null
let lng=null

const c=extractLatLng(url)

if(c){
lat=c.lat
lng=c.lng
}

stores.push({
name,
pref,
visits:0,
buyDays:0,
items:0,
profit:0,
lat,
lng
})

save()

document.getElementById("storeName").value=""
document.getElementById("prefName").value=""
document.getElementById("mapUrl").value=""

render()
}

function calcMetrics(s){

const visits=s.visits||0
const success=s.buyDays||0
const profit=s.profit||0
const items=s.items||0

const rate=visits?success/visits:0
const avgProfit=success?profit/success:0
const expected=rate*avgProfit

return{
visits,
success,
items,
profit,
rate:rate*100,
avgProfit,
expected
}

}

function distanceKm(lat1,lng1,lat2,lng2){

const R=6371

const dLat=(lat2-lat1)*Math.PI/180
const dLng=(lng2-lng1)*Math.PI/180

const a=
Math.sin(dLat/2)**2+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLng/2)**2

const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))

return R*c
}

function render(){

const area=document.getElementById("storeList")

let html=""

stores.forEach(s=>{

const m=calcMetrics(s)

html+=`
<div class="store">

<div class="storeTitle">${s.name}</div>

<div class="meta">

訪問 ${m.visits}回<br>

成功 ${m.success}回<br>

個数 ${m.items}個<br>

利益 ${m.profit.toLocaleString()}円<br>

成功率 ${m.rate.toFixed(1)}%<br>

期待値 ${Math.round(m.expected)}円

</div>

</div>
`

})

area.innerHTML=html
}

function showNearbyStores(){

if(!navigator.geolocation){

alert("位置情報が使えません")

return
}

navigator.geolocation.getCurrentPosition(pos=>{

const lat=pos.coords.latitude
const lng=pos.coords.longitude

const near=[]
const far=[]

stores.forEach(s=>{

if(typeof s.lat!=="number"){

far.push(s)

return
}

const dist=distanceKm(lat,lng,s.lat,s.lng)

if(dist<=3){

near.push({...s,dist})

}else{

far.push({...s,dist})

}

})

near.sort((a,b)=>a.dist-b.dist)

let html=""

if(near.length){

html+=`<div class="sectionTitle">📍近くの店舗（3km以内）</div>`

near.forEach(s=>{

const m=calcMetrics(s)

html+=`
<div class="store">

<div class="storeTitle">${s.name}</div>

<div class="meta">

距離 ${s.dist.toFixed(1)}km<br>

期待値 ${Math.round(m.expected)}円<br>

成功率 ${m.rate.toFixed(1)}%

</div>

</div>
`

})

html+=`<div class="sectionTitle">その他の店舗</div>`
}

far.forEach(s=>{

const m=calcMetrics(s)

html+=`
<div class="store">

<div class="storeTitle">${s.name}</div>

<div class="meta">

期待値 ${Math.round(m.expected)}円<br>

成功率 ${m.rate.toFixed(1)}%

</div>

</div>
`

})

document.getElementById("storeList").innerHTML=html

})

}

render()

</script>

</body>
</html>

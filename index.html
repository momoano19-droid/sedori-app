<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>せどりGPS管理PRO 最終完成版</title>

<style>
:root{
  --btn-font:16px;
  --btn-pad:10px;
  --btn-radius:10px;
}
body{font-family:-apple-system;padding:16px;background:#f4f6f8;}
h1{font-size:20px;margin-bottom:10px;}

input,select,button{
  padding:var(--btn-pad);
  font-size:var(--btn-font);
  border-radius:var(--btn-radius);
  border:none;
  width:100%;
  margin:6px 0;
  box-sizing:border-box;
}
button{background:#007aff;color:white;}
button.secondary{background:#e9eef6;color:#111;}
button.danger{background:#ff3b30;}

.toolbar{
  background:#fff;
  padding:12px;
  border-radius:12px;
  margin-top:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.06);
}
.store{
  background:#fff;
  padding:14px;
  border-radius:12px;
  margin-top:14px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
.storeTitle{
  font-size:24px;
  font-weight:900;
  margin-bottom:6px;
}
.badge{
  background:#eef2f7;
  padding:2px 8px;
  border-radius:999px;
  font-size:12px;
  margin-right:6px;
}
.row2{display:flex;gap:8px;}
.row2>*{flex:1;}
.kv{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.pill{background:#f0f3f8;padding:6px 10px;border-radius:999px;font-size:13px;}
table{width:100%;border-collapse:collapse;margin-top:10px;}
th,td{border-bottom:1px solid #eee;padding:8px;font-size:14px;}
th{background:#f7f9fc;}
</style>
</head>

<body>

<h1>せどりGPS管理PRO 最終完成版</h1>

<div class="row2">
  <input id="storeName" placeholder="店舗名">
  <input id="prefName" placeholder="都道府県">
</div>
<input id="mapUrl" placeholder="GoogleマップURL（長いURL）">
<button onclick="addStore()">店舗追加</button>

<!-- ボタン設定 -->
<div class="toolbar">
  <b>ボタン表示設定</b>
  文字サイズ<input type="range" min="12" max="24" value="16" id="btnFont" oninput="updateBtnStyle()">
  高さ<input type="range" min="6" max="20" value="10" id="btnPad" oninput="updateBtnStyle()">
  角丸<input type="range" min="6" max="28" value="10" id="btnRadius" oninput="updateBtnStyle()">
</div>

<!-- レイアウト -->
<div class="toolbar">
  <div class="row2">
    <button onclick="setLayout('detail')">詳細</button>
    <button onclick="setLayout('compact')">コンパクト</button>
    <button onclick="setLayout('analysis')">分析</button>
  </div>
</div>

<!-- 今日ルート -->
<div class="toolbar">
  <div class="row2">
    <button onclick="buildTodayRoute()">今日ルート作成</button>
    <select id="todayPrefSelect"></select>
  </div>
  <div class="row2">
    <button class="secondary" onclick="bulkToday(true)">都道府県ON</button>
    <button class="secondary" onclick="bulkToday(false)">都道府県OFF</button>
  </div>
  <div id="todayPlanArea"></div>
</div>

<!-- レポート -->
<div class="toolbar">
  <button onclick="toggleReport()">レポート表示/非表示</button>
  <div id="reportWrap">
    <input type="month" id="reportMonth">
    <div id="reportArea"></div>
  </div>
</div>

<div id="storeList"></div>

<script>
let stores=JSON.parse(localStorage.getItem("stores")||"[]");
let logs=JSON.parse(localStorage.getItem("logs")||"[]");
let layout=localStorage.getItem("layout")||"detail";

function save(){
  localStorage.setItem("stores",JSON.stringify(stores));
  localStorage.setItem("logs",JSON.stringify(logs));
  localStorage.setItem("layout",layout);
}

function todayStr(){return new Date().toISOString().slice(0,10);}

function extractLatLng(url){
  if(!url)return null;
  let m=url.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
  if(m)return{lat:parseFloat(m[1]),lng:parseFloat(m[2])};
  return null;
}

function addStore(){
  const name=storeName.value.trim();
  if(!name)return;
  let lat=null,lng=null;
  const c=extractLatLng(mapUrl.value);
  if(c){lat=c.lat;lng=c.lng;}
  stores.push({
    id:Date.now(),
    name,
    pref:prefName.value.trim(),
    visits:0,buyDays:0,items:0,profit:0,
    lat,lng,today:false
  });
  storeName.value="";
  prefName.value="";
  mapUrl.value="";
  save();render();
}

function setLayout(v){layout=v;save();render();}

function updateBtnStyle(){
  const f=btnFont.value;
  const p=btnPad.value;
  const r=btnRadius.value;
  document.documentElement.style.setProperty("--btn-font",f+"px");
  document.documentElement.style.setProperty("--btn-pad",p+"px");
  document.documentElement.style.setProperty("--btn-radius",r+"px");
}

function buildTodayPrefSelect(){
  const sel=todayPrefSelect;
  const set=new Set();
  stores.forEach(s=>{if(s.pref)set.add(s.pref)});
  sel.innerHTML="<option value='__ALL__'>全て</option>";
  set.forEach(p=>sel.innerHTML+=`<option value="${p}">${p}</option>`);
}

function bulkToday(flag){
  const p=todayPrefSelect.value;
  stores.forEach(s=>{
    if(p==="__ALL__"||s.pref===p)s.today=flag;
  });
  save();render();
}

function distanceKm(a,b,c,d){
  const R=6371;
  const dLat=(c-a)*Math.PI/180;
  const dLng=(d-b)*Math.PI/180;
  const x=Math.sin(dLat/2)**2+
  Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*
  Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}

function buildTodayRoute(){
navigator.geolocation.getCurrentPosition(pos=>{
const start={lat:pos.coords.latitude,lng:pos.coords.longitude};
let targets=stores.filter(s=>s.today&&s.lat);

if(!targets.length){alert("座標がありません");return;}

targets.forEach(s=>{
const rate=s.visits>0?(s.buyDays/s.visits):0;
const avg=s.buyDays>0?(s.profit/s.buyDays):0;
s.expected=rate*avg;
s.dist=distanceKm(start.lat,start.lng,s.lat,s.lng);
s.score=s.expected/(s.dist+0.3);
});

targets.sort((a,b)=>b.score-a.score);
targets=targets.slice(0,30);

let total=targets.reduce((sum,s)=>sum+s.expected,0);

let html=`<div class="kv">
<div class="pill">巡回:${targets.length}</div>
<div class="pill">予想総利益:${Math.round(total)}円</div>
</div>`;

targets.forEach((s,i)=>{
html+=`${i+1}. ${s.name}（期待値:${Math.round(s.expected)}円）<br>`;
});

todayPlanArea.innerHTML=html;
});
}

function visit(i){
stores[i].visits++;
logs.push({date:todayStr(),type:"visit"});
save();render();
}
function success(i){
stores[i].buyDays++;
logs.push({date:todayStr(),type:"success"});
save();render();
}
function profitAdd(i){
const n=parseInt(prompt("利益追加","1000"));
if(!n)return;
stores[i].profit+=n;
logs.push({date:todayStr(),type:"profit",delta:n});
save();render();
}

function toggleReport(){
reportWrap.style.display=(reportWrap.style.display==="none")?"block":"none";
}

function render(){
buildTodayPrefSelect();
const list=storeList;
list.innerHTML="";

stores.forEach((s,i)=>{
const rate=s.visits>0?(s.buyDays/s.visits*100):0;
const avg=s.buyDays>0?(s.profit/s.buyDays):0;
const expected=(rate/100)*avg;

list.innerHTML+=`
<div class="store">
<div class="storeTitle">${s.name}</div>
<div>
<span class="badge">${s.pref||"未設定"}</span>
<span class="badge">成功率:${rate.toFixed(1)}%</span>
<span class="badge">期待値:${Math.round(expected)}円</span>
</div>
<div style="margin-top:6px;">
訪問:${s.visits} 成功:${s.buyDays} 利益:${s.profit}円
</div>
<div class="row2">
<button onclick="visit(${i})">訪問＋</button>
<button onclick="success(${i})">成功＋</button>
</div>
<div class="row2">
<button onclick="profitAdd(${i})">利益＋</button>
<button onclick="s.today=!s.today;save();render();">
${s.today?"今日行く✔":"今日行く"}
</button>
</div>
</div>`;
});
}

render();
</script>

</body>
</html>

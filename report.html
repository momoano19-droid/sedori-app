<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>分析画面 | せどりGPS管理PRO</title>

<style>
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    padding:16px;
    background:#f4f6f8;
    color:#222;
  }
  h1{
    font-size:22px;
    margin:0 0 6px 0;
  }
  .sub{
    color:#667;
    font-size:13px;
    margin-bottom:12px;
  }
  .toolbar,.card{
    background:#fff;
    border-radius:12px;
    padding:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    margin-top:12px;
  }
  .row2{
    display:flex;
    gap:8px;
  }
  .row2 > *{
    flex:1;
  }
  button,select{
    padding:10px;
    width:100%;
    font-size:16px;
    box-sizing:border-box;
    border:none;
    border-radius:10px;
  }
  button{
    background:#007aff;
    color:#fff;
  }
  button.secondary{
    background:#e9eef6;
    color:#123;
  }
  .kv{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .pill{
    background:#f0f3f8;
    border-radius:999px;
    padding:6px 10px;
    font-size:13px;
  }
  .sectionTitle{
    font-weight:800;
    color:#223;
    margin-top:18px;
    margin-bottom:8px;
  }
  table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
    margin-top:10px;
  }
  th,td{
    padding:10px;
    border-bottom:1px solid #eef2f7;
    text-align:left;
    font-size:14px;
  }
  th{
    background:#f7f9fc;
    color:#223;
  }
  tr:last-child td{
    border-bottom:none;
  }
  .gray{
    color:#666;
    font-size:14px;
  }
</style>
</head>
<body>
<h1>📊 分析画面</h1>
<div class="sub">月次サマリー・曜日分析・ランキング・補充周期・カテゴリ集計をまとめて見る画面です。</div>

<div class="toolbar">
  <div class="row2">
    <button onclick="location.href='index.html'">🏠 店舗管理へ戻る</button>
    <button class="secondary" onclick="renderReport()">更新</button>
  </div>
</div>

<div class="toolbar">
  <div class="row2">
    <select id="monthSelect" onchange="renderReport()"></select>
    <select id="prefFilter" onchange="renderReport()"></select>
  </div>
</div>

<div id="reportArea"></div>

<script>
const KEY_STORES = "stores";
const KEY_LOGS = "logs";

let stores = JSON.parse(localStorage.getItem(KEY_STORES) || "[]");
let logs = JSON.parse(localStorage.getItem(KEY_LOGS) || "[]");

function escapeHtml(str){
  return String(str)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function clampNonNeg(n){
  return Math.max(0, Number(n) || 0);
}
function parseDateLocal(dateStr){
  if(!dateStr) return null;
  const parts = String(dateStr).split("-");
  if(parts.length !== 3) return null;
  const y = Number(parts[0]);
  const m = Number(parts[1]);
  const d = Number(parts[2]);
  if(!y || !m || !d) return null;
  return new Date(y, m - 1, d);
}
function getWeekdayJa(dateStr){
  const d = parseDateLocal(dateStr);
  if(!d) return "";
  return ["日","月","火","水","木","金","土"][d.getDay()];
}
function daysBetween(a, b){
  const da = parseDateLocal(a);
  const db = parseDateLocal(b);
  if(!da || !db) return null;
  return Math.abs(db - da) / (1000 * 60 * 60 * 24);
}

function calcMetrics(s){
  const visits = clampNonNeg(s.visits);
  const success = clampNonNeg(s.buyDays);
  const items = clampNonNeg(s.items);
  const profit = clampNonNeg(s.profit);

  const rate = visits > 0 ? (success / visits) * 100 : 0;
  const avgProfit = success > 0 ? (profit / success) : 0;
  const expected = (rate / 100) * avgProfit;
  const avgItems = success > 0 ? (items / success) : 0;

  return {visits, success, items, profit, rate, avgProfit, expected, avgItems};
}

function getStoreVisitDates(storeId){
  const dates = logs
    .filter(x => x.storeId === storeId && x.type === "visit" && Number(x.delta) > 0 && x.date)
    .map(x => x.date)
    .sort();
  return [...new Set(dates)];
}

function calcRestockCycle(storeId){
  const dates = getStoreVisitDates(storeId);
  if(dates.length < 2) return null;
  const diffs = [];
  for(let i=1;i<dates.length;i++){
    const diff = daysBetween(dates[i-1], dates[i]);
    if(typeof diff === "number" && diff > 0) diffs.push(diff);
  }
  if(!diffs.length) return null;
  return diffs.reduce((a,b)=>a+b,0) / diffs.length;
}

function calcStrongWeekdays(storeId){
  const visitDates = getStoreVisitDates(storeId);
  if(!visitDates.length) return [];
  const countMap = {};
  visitDates.forEach(dateStr=>{
    const w = getWeekdayJa(dateStr);
    if(!w) return;
    countMap[w] = (countMap[w] || 0) + 1;
  });
  const entries = Object.entries(countMap).sort((a,b)=>b[1]-a[1]);
  if(!entries.length) return [];
  const max = entries[0][1];
  return entries.filter(x => x[1] === max).map(x => x[0]);
}

function buildMonthSelect(){
  const sel = document.getElementById("monthSelect");
  const set = new Set();

  logs.forEach(l=>{
    if(l.date && String(l.date).length >= 7){
      set.add(String(l.date).slice(0,7));
    }
  });

  if(set.size === 0){
    const now = new Date();
    const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
    set.add(month);
  }

  const months = Array.from(set).sort().reverse();
  const current = sel.value || months[0];

  sel.innerHTML = months.map(m => `<option value="${m}">${m}</option>`).join("");
  if(months.includes(current)) sel.value = current;
}

function buildPrefFilter(){
  const sel = document.getElementById("prefFilter");
  const prefSet = new Set();
  stores.forEach(s=>{
    const p = String(s.pref || "").trim();
    if(p) prefSet.add(p);
  });
  const prefs = Array.from(prefSet).sort((a,b)=>a.localeCompare(b,'ja'));
  const current = sel.value || "__ALL__";

  sel.innerHTML = `<option value="__ALL__">全都道府県</option>` + prefs.map(p => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join("");
  if(["__ALL__", ...prefs].includes(current)) sel.value = current;
}

function getFilteredStores(){
  const pref = document.getElementById("prefFilter").value;
  if(pref === "__ALL__") return stores.slice();
  return stores.filter(s => String(s.pref || "").trim() === pref);
}

function getMonthLogs(month, storeIdsSet){
  return logs.filter(l => String(l.date || "").startsWith(month) && storeIdsSet.has(l.storeId));
}

function renderReport(){
  buildMonthSelect();
  buildPrefFilter();

  const month = document.getElementById("monthSelect").value;
  const filteredStores = getFilteredStores();
  const storeIdsSet = new Set(filteredStores.map(s => s.id));
  const monthLogs = getMonthLogs(month, storeIdsSet);

  const reportArea = document.getElementById("reportArea");

  const storeMap = new Map(filteredStores.map(s => [s.id, s]));

  let monthProfit = 0;
  let monthVisits = 0;
  let monthSuccess = 0;
  let monthItems = 0;

  monthLogs.forEach(l=>{
    if(l.type === "profit") monthProfit += Number(l.delta) || 0;
    if(l.type === "visit" && Number(l.delta) > 0) monthVisits += Number(l.delta) || 0;
    if(l.type === "success" && Number(l.delta) > 0) monthSuccess += Number(l.delta) || 0;
    if(l.type === "items" && Number(l.delta) > 0) monthItems += Number(l.delta) || 0;
  });

  const monthRate = monthVisits > 0 ? (monthSuccess / monthVisits) * 100 : 0;

  const weekdayMap = {
    "月": {profit:0, visits:0, success:0},
    "火": {profit:0, visits:0, success:0},
    "水": {profit:0, visits:0, success:0},
    "木": {profit:0, visits:0, success:0},
    "金": {profit:0, visits:0, success:0},
    "土": {profit:0, visits:0, success:0},
    "日": {profit:0, visits:0, success:0}
  };

  monthLogs.forEach(l=>{
    const w = getWeekdayJa(l.date);
    if(!weekdayMap[w]) return;
    if(l.type === "profit") weekdayMap[w].profit += Number(l.delta) || 0;
    if(l.type === "visit" && Number(l.delta) > 0) weekdayMap[w].visits += Number(l.delta) || 0;
    if(l.type === "success" && Number(l.delta) > 0) weekdayMap[w].success += Number(l.delta) || 0;
  });

  const categoryMap = {};
  monthLogs.forEach(l=>{
    if(l.type === "items" && Number(l.delta) > 0 && l.category){
      const c = String(l.category).trim();
      if(!c) return;
      categoryMap[c] = (categoryMap[c] || 0) + (Number(l.delta) || 0);
    }
  });

  const enrichedStores = filteredStores.map(s=>{
    const m = calcMetrics(s);
    return {
      ...s,
      _m: m,
      _restock: calcRestockCycle(s.id),
      _strongWeekdays: calcStrongWeekdays(s.id)
    };
  });

  const topExpected = enrichedStores.slice().sort((a,b)=>b._m.expected - a._m.expected).slice(0,10);
  const topProfit = enrichedStores.slice().sort((a,b)=>b._m.profit - a._m.profit).slice(0,10);
  const topRate = enrichedStores.slice().sort((a,b)=>b._m.rate - a._m.rate).slice(0,10);
  const topAvgProfit = enrichedStores.slice().sort((a,b)=>b._m.avgProfit - a._m.avgProfit).slice(0,10);
  const topAvgItems = enrichedStores.slice().sort((a,b)=>b._m.avgItems - a._m.avgItems).slice(0,10);
  const restockList = enrichedStores
    .filter(s => typeof s._restock === "number")
    .sort((a,b)=>a._restock - b._restock);

  function tableForStores(rows, columns){
    return `
      <table>
        <thead>
          <tr>${columns.map(c=>`<th>${c.label}</th>`).join("")}</tr>
        </thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              ${columns.map(c=>`<td>${c.render(r)}</td>`).join("")}
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;
  }

  reportArea.innerHTML = `
    <div class="card">
      <div class="sectionTitle">📌 ${escapeHtml(month)} サマリー</div>
      <div class="kv">
        <div class="pill"><b>対象店舗</b> ${filteredStores.length}件</div>
        <div class="pill"><b>今月利益</b> ${monthProfit.toLocaleString()}円</div>
        <div class="pill"><b>今月訪問</b> ${monthVisits}回</div>
        <div class="pill"><b>今月成功</b> ${monthSuccess}回</div>
        <div class="pill"><b>今月個数</b> ${monthItems}個</div>
        <div class="pill"><b>今月成功率</b> ${monthRate.toFixed(1)}%</div>
      </div>
    </div>

    <div class="sectionTitle">📅 曜日分析</div>
    <table>
      <thead>
        <tr>
          <th>曜日</th>
          <th>利益</th>
          <th>訪問</th>
          <th>成功</th>
          <th>成功率</th>
        </tr>
      </thead>
      <tbody>
        ${["月","火","水","木","金","土","日"].map(w=>{
          const row = weekdayMap[w];
          const rate = row.visits > 0 ? (row.success / row.visits) * 100 : 0;
          return `
            <tr>
              <td>${w}</td>
              <td>${row.profit.toLocaleString()}円</td>
              <td>${row.visits}回</td>
              <td>${row.success}回</td>
              <td>${rate.toFixed(1)}%</td>
            </tr>
          `;
        }).join("")}
      </tbody>
    </table>

    <div class="sectionTitle">🏆 期待値TOP10</div>
    ${tableForStores(topExpected, [
      {label:"店舗", render:r=>escapeHtml(r.name)},
      {label:"都道府県", render:r=>escapeHtml(String(r.pref || "").trim() || "未設定")},
      {label:"期待値", render:r=>`${Math.round(r._m.expected).toLocaleString()}円`},
      {label:"成功率", render:r=>`${r._m.rate.toFixed(1)}%`}
    ])}

    <div class="sectionTitle">💰 利益TOP10</div>
    ${tableForStores(topProfit, [
      {label:"店舗", render:r=>escapeHtml(r.name)},
      {label:"都道府県", render:r=>escapeHtml(String(r.pref || "").trim() || "未設定")},
      {label:"利益", render:r=>`${r._m.profit.toLocaleString()}円`},
      {label:"成功率", render:r=>`${r._m.rate.toFixed(1)}%`}
    ])}

    <div class="sectionTitle">🎯 成功率TOP10</div>
    ${tableForStores(topRate, [
      {label:"店舗", render:r=>escapeHtml(r.name)},
      {label:"都道府県", render:r=>escapeHtml(String(r.pref || "").trim() || "未設定")},
      {label:"成功率", render:r=>`${r._m.rate.toFixed(1)}%`},
      {label:"期待値", render:r=>`${Math.round(r._m.expected).toLocaleString()}円`}
    ])}

    <div class="sectionTitle">📈 平均利益TOP10</div>
    ${tableForStores(topAvgProfit, [
      {label:"店舗", render:r=>escapeHtml(r.name)},
      {label:"都道府県", render:r=>escapeHtml(String(r.pref || "").trim() || "未設定")},
      {label:"平均利益", render:r=>`${Math.round(r._m.avgProfit).toLocaleString()}円`},
      {label:"平均個数", render:r=>`${r._m.avgItems.toFixed(1)}個`}
    ])}

    <div class="sectionTitle">📦 平均個数TOP10</div>
    ${tableForStores(topAvgItems, [
      {label:"店舗", render:r=>escapeHtml(r.name)},
      {label:"都道府県", render:r=>escapeHtml(String(r.pref || "").trim() || "未設定")},
      {label:"平均個数", render:r=>`${r._m.avgItems.toFixed(1)}個`},
      {label:"平均利益", render:r=>`${Math.round(r._m.avgProfit).toLocaleString()}円`}
    ])}

    <div class="sectionTitle">🔁 補充周期一覧</div>
    ${restockList.length ? tableForStores(restockList, [
      {label:"店舗", render:r=>escapeHtml(r.name)},
      {label:"都道府県", render:r=>escapeHtml(String(r.pref || "").trim() || "未設定")},
      {label:"補充周期", render:r=>`${r._restock.toFixed(1)}日`},
      {label:"強い曜日", render:r=>r._strongWeekdays.length ? r._strongWeekdays.join("/") : "—"}
    ]) : `<div class="card"><div class="gray">補充周期を出すには、同じ店舗で2回以上の訪問ログが必要です。</div></div>`}

    <div class="sectionTitle">🗂 カテゴリ集計（今月個数）</div>
    ${Object.keys(categoryMap).length ? `
      <table>
        <thead>
          <tr>
            <th>カテゴリ</th>
            <th>個数</th>
          </tr>
        </thead>
        <tbody>
          ${Object.entries(categoryMap)
            .sort((a,b)=>b[1]-a[1])
            .map(([k,v])=>`
              <tr>
                <td>${escapeHtml(k)}</td>
                <td>${v}</td>
              </tr>
            `).join("")}
        </tbody>
      </table>
    ` : `<div class="card"><div class="gray">今月のカテゴリ個数ログはまだありません。</div></div>`}
  `;
}

(function init(){
  buildMonthSelect();
  buildPrefFilter();
  renderReport();
})();
</script>
</body>
</html>
